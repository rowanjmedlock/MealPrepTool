// --- Dinner state mutators ---
function setDinnerProtein(dayIdx, proteinName) {
  const dm = state.dinnerMethods[dayIdx] || {};
  // If protein changed, clear downstream (sauce/method/rub need re-filtering)
  if(dm.protein !== proteinName) {
    state.dinnerMethods[dayIdx] = { protein: proteinName, expandSauces: dm.expandSauces || false, cookType: dm.cookType || 'finishing' };
  } else {
    state.dinnerMethods[dayIdx] = { ...dm, protein: proteinName };
  }
  renderDinnerEditor();
}

function toggleDinnerExpand(dayIdx) {
  const dm = state.dinnerMethods[dayIdx] || {};
  state.dinnerMethods[dayIdx] = { ...dm, expandSauces: !dm.expandSauces, sauce: null, method: null, rub: null };
  renderDinnerEditor();
}

function setDinnerCookType(dayIdx, cookType) {
  const dm = state.dinnerMethods[dayIdx] || {};
  if(dm.cookType === cookType) return;
  // Changing cook type invalidates method and rub (different pools)
  state.dinnerMethods[dayIdx] = { ...dm, cookType, method: null, rub: null };
  renderDinnerEditor();
}

function clearDinnerField(field) {
  if(currentDinnerDay === null) return;
  const idx = currentDinnerDay;
  const dm = state.dinnerMethods[idx] || {};
  // Clear this field and everything downstream
  const cleared = { ...dm };
  if(field === 'sauce' || field === 'method' || field === 'rub') {
    if(field === 'sauce') { cleared.sauce = null; cleared.method = null; cleared.rub = null; }
    if(field === 'method') { cleared.method = null; cleared.rub = null; }
    if(field === 'rub') { cleared.rub = null; }
  }
  state.dinnerMethods[idx] = cleared;
  renderDinnerEditor();
}

function clearDinnerAll(dayIdx) {
  if(!confirm('Clear all selections for this day?')) return;
  delete state.dinnerMethods[dayIdx];
  renderDinnerEditor();
}

function skipDinnerRub() {
  if(currentDinnerDay === null) return;
  const dm = state.dinnerMethods[currentDinnerDay] || {};
  // Mark rub as explicitly skipped (null but decision made)
  state.dinnerMethods[currentDinnerDay] = { ...dm, rub: null, rubSkipped: true };
  renderDinnerEditor();
}

// --- Dinner wheel spinners ---
function spinDinner(which) {
  if(currentDinnerDay === null) return;
  if(activeDinnerSpin) return;
  const idx = currentDinnerDay;
  const dm = state.dinnerMethods[idx] || {};
  let canvasId, pool, applyResult;

  if(which === 'sauce') {
    canvasId = 'dinnerSauceWheel';
    pool = getDailySaucePool(dm.protein, !!dm.expandSauces);
    applyResult = (pick) => {
      state.dinnerMethods[idx] = { ...dm, sauce: pick, method: null, rub: null };
    };
  } else if(which === 'method') {
    canvasId = 'dinnerMethodWheel';
    pool = getDailyMethodPool(dm.protein, dm.cookType || 'finishing', dm.sauce);
    applyResult = (pick) => {
      state.dinnerMethods[idx] = { ...dm, method: pick, rub: null };
    };
  } else if(which === 'rub') {
    canvasId = 'dinnerRubWheel';
    pool = getDailyRubPool(dm.protein, dm.method.name, dm.sauce);
    applyResult = (pick) => {
      state.dinnerMethods[idx] = { ...dm, rub: pick, rubSkipped: false };
    };
  } else {
    return;
  }

  if(!pool || pool.length === 0) return;
  const items = pool.map(x => x.name);
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;

  activeDinnerSpin = which;
  const targetIdx = Math.floor(Math.random() * items.length);
  const arc = (Math.PI*2)/items.length;
  const targetRot = -(targetIdx*arc) - arc/2 + (Math.random()-0.5)*arc*0.6;
  const totalSpin = Math.PI*8 + targetRot;
  const duration = 3500;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed/duration, 1);
    const eased = 1 - Math.pow(1-progress, 3);
    drawWheel(canvasId, items, eased * totalSpin);
    if(progress < 1) {
      requestAnimationFrame(animate);
    } else {
      applyResult(pool[targetIdx]);
      activeDinnerSpin = null;
      renderDinnerEditor();
    }
  }
  requestAnimationFrame(animate);
}

function respinDinner(which) {
  if(currentDinnerDay === null) return;
  const idx = currentDinnerDay;
  const dm = state.dinnerMethods[idx] || {};
  // Clear the field + downstream, then re-render; user can hit Spin again
  const cleared = { ...dm };
  if(which === 'sauce') { cleared.sauce = null; cleared.method = null; cleared.rub = null; }
  if(which === 'method') { cleared.method = null; cleared.rub = null; }
  if(which === 'rub') { cleared.rub = null; cleared.rubSkipped = false; }
  state.dinnerMethods[idx] = cleared;
  renderDinnerEditor();
}

// --- LEGACY HELPERS kept for backwards compatibility with Dashboard re-spin + other callers ---
function flipProtein(dayIdx) {
  const proteins = state.weekIngredients.proteins;
  if(proteins.length < 2) return;
  const pick = proteins[Math.random() < 0.5 ? 0 : 1];
  setDinnerProtein(dayIdx, pick.name);
}

function reflipProtein(dayIdx) {
  delete state.dinnerMethods[dayIdx];
  renderPhase(3);
}

function pickDinnerProtein(dayIdx, proteinIdx) {
  const proteins = state.weekIngredients.proteins;
  setDinnerProtein(dayIdx, proteins[proteinIdx].name);
}

function spinDinnerMethod(dayIdx) {
  // Legacy path — pick a finishing method for the protein already set on this day
  const dm = state.dinnerMethods[dayIdx];
  if(!dm || !dm.protein) return;
  const filtered = getFilteredFinishingMethods(dm.protein);
  if(filtered.length === 0) return;
  const pick = filtered[Math.floor(Math.random() * filtered.length)];
  state.dinnerMethods[dayIdx] = { ...dm, method: pick, cookType: 'finishing' };
  renderPhase(3);
}

function respinDinnerMethod(dayIdx) {
  const dm = state.dinnerMethods[dayIdx];
  if(!dm) return;
  state.dinnerMethods[dayIdx] = { ...dm, method: null, rub: null };
  renderPhase(3);
}

function suggestSauceForDinner(method, proteinName) {
  const sauces = state.selectedSauces.filter(Boolean);
  if(sauces.length === 0) return 'No sauces selected yet';
  if(sauces.length === 1) return sauces[0].name;
  const glazeSauces = ['Honey Sriracha Soy Glaze','Gochujang Glaze','Maple Dijon'];
  if(['Sauté & Glaze','Skillet Sear'].includes(method.name)) {
    const glaze = sauces.find(s => glazeSauces.includes(s.name));
    if(glaze) return glaze.name;
  }
  return sauces.map(s => s.name).join(' or ');
}

// --- RESPIN (cascade-aware) ---
function respin(type) {
  // type is one of: 'method0', 'method1', 'sauce0', 'sauce1', 'snack'
  if(type === 'method0' || type === 'method1') {
    const pi = type === 'method0' ? 0 : 1;
    state.batchMethods[pi] = null;
    // Cascade: both sauces depend on both methods (shared pool), so clear both
    state.selectedSauces[0] = null;
    state.selectedSauces[1] = null;

  } else if(type === 'snack') {
    state.selectedSnack = null;
  }
  renderPhase(3);
  setTimeout(drawAllWheels, 50);
}

// ============================================================
// WHEEL DRAWING & SPINNING (iOS-compatible, Retina-aware)
// ============================================================
function drawWheel(canvasId, items, rotation=0) {
  const canvas = document.getElementById(canvasId);
  if(!canvas || !items || items.length === 0) return;
  
  // Retina / HiDPI support — critical for sharp text on iOS
  const dpr = window.devicePixelRatio || 1;
  const displaySize = 300; // CSS size
  canvas.style.width = displaySize + 'px';
  canvas.style.height = displaySize + 'px';
  canvas.width = displaySize * dpr;
  canvas.height = displaySize * dpr;
  
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  
  const cx = displaySize/2, cy = displaySize/2, r = displaySize/2 - 10;
  ctx.clearRect(0, 0, displaySize, displaySize);
  const arc = (Math.PI*2)/items.length;
  
  items.forEach((item, i) => {
    const startAngle = rotation + i*arc - Math.PI/2;
    const endAngle = startAngle + arc;
    
    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'white';
    const fontSize = Math.min(13, 140/items.length);
    ctx.font = `bold ${fontSize}px 'DM Sans', sans-serif`;
    const label = item.length > 18 ? item.substring(0,16)+'…' : item;
    ctx.fillText(label, r-15, 4);
    ctx.restore();
  });
  
  // Center circle
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.1)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, Math.PI*2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.restore();
}

function spinWheel(type) {
  if(activeSpins.has(type)) return;
  
  let canvasId, items, sourceItems, onResult;
  
  // Parse per-protein types: method0, method1, sauce0, sauce1
  const methodMatch = type.match(/^method(\d+)$/);
  const sauceMatch = type.match(/^sauce(\d+)$/);
  
  if(methodMatch) {
    const pi = parseInt(methodMatch[1]);
    canvasId = 'methodWheel' + pi;
    sourceItems = getFilteredBatchMethodsForProtein(pi);
    items = sourceItems.map(m => m.name);
    onResult = (idx) => {
      state.batchMethods[pi] = sourceItems[idx];
      // Cascade: clear BOTH sauces so they re-spin against the new shared pool
      // (both proteins' sauces depend on both methods via getSharedSaucePool)
      state.selectedSauces[0] = null;
      state.selectedSauces[1] = null;
      activeSpins.delete(type);
      renderPhase(3);
      setTimeout(drawAllWheels, 50);
    };
  } else if(sauceMatch) {
    const pi = parseInt(sauceMatch[1]);
    canvasId = 'sauceWheel' + pi;
    sourceItems = getFilteredSaucesForProtein(pi);
    items = sourceItems.map(s => s.name);
    onResult = (idx) => {
      state.selectedSauces[pi] = sourceItems[idx];
      // If protein 0's sauce changed, protein 1's cuisine-divergence filter is stale — clear it
      if(pi === 0) {
        state.selectedSauces[1] = null;
      }
      activeSpins.delete(type);
      renderPhase(3);
      setTimeout(drawAllWheels, 50);
    };
  } else if(type === 'snack') {
    canvasId = 'snackWheel';
    sourceItems = state.snacks;
    items = sourceItems.map(s => s.name);
    onResult = (idx) => {
      state.selectedSnack = sourceItems[idx];
      activeSpins.delete(type);
      renderPhase(3);
      setTimeout(drawAllWheels, 50);
    };
  }
  
  if(!items || items.length === 0) return;
  
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  
  activeSpins.add(type);
  
  const targetIdx = Math.floor(Math.random()*items.length);
  const arc = (Math.PI*2)/items.length;
  const targetRot = -(targetIdx*arc) - arc/2 + (Math.random()-0.5)*arc*0.6;
  const totalSpin = Math.PI*8 + targetRot;
  
  const duration = 3500;
  const startTime = performance.now();
  
  const btnId = `spin${type.charAt(0).toUpperCase()+type.slice(1)}Btn`;
  const btn = document.getElementById(btnId);
  if(btn) btn.disabled = true;
  
  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed/duration, 1);
    const eased = 1 - Math.pow(1-progress, 3);
    const currentRot = eased * totalSpin;
    
    drawWheel(canvasId, items, currentRot);
    
    if(progress < 1) {
      requestAnimationFrame(animate);
    } else {
      onResult(targetIdx);
    }
  }
  
  requestAnimationFrame(animate);
}

function buildGroceryList() {
  const tdee = calcTDEE();
  const totalMeals = state.calendar.reduce((acc,d) => {
    if(d.lunch > 0) acc.lunchMeals++;
    if(d.dinner > 0) acc.dinnerMeals++;
    acc.lunchPeople += d.lunch;
    acc.dinnerPeople += d.dinner;
    return acc;
  }, {lunchMeals:0, dinnerMeals:0, lunchPeople:0, dinnerPeople:0});
  
  const totalPortions = totalMeals.lunchPeople + totalMeals.dinnerPeople;
  if(totalPortions === 0) return {produce:[],meat:[],dairy:[],grains:[],pantry:[],athlete:[],neededStaples:[]};
  
  // Average portion per person per meal ~400g food total
  // Split: ~150g protein, ~150g carb, ~100g veg per person meal
  const proteinPerPerson = 150; // grams
  const carbPerPerson = 150;
  
  // Calculate total grams needed for each protein/carb
  const proteins = state.weekIngredients.proteins;
  const carbs = state.weekIngredients.carbs;
  const vegs = state.weekIngredients.vegetables;
  
  const mealsPerProtein = totalPortions / Math.max(proteins.length,1);
  const mealsPerCarb = totalPortions / Math.max(carbs.length,1);
  
  const meat = [];
  proteins.forEach((p,i) => {
    let grams = mealsPerProtein * proteinPerPerson;
    const totalLbs = grams / 453.592;
    const totalRounded = Math.ceil(totalLbs * 2) / 2;
    const leftKey = `protein-${i}`;
    const left = state.leftovers[leftKey];
    if(left && left.amount > 0) {
      const need = Math.max(totalRounded - left.amount, 0);
      const needRounded = Math.ceil(need * 2) / 2;
      meat.push({name:p.name, qty:`${needRounded} lbs <span style="color:var(--text3);font-weight:400;font-size:0.85em;">(need ${totalRounded}, have ${left.amount})</span>`, tags:['PREP'], raw:needRounded});
    } else {
      meat.push({name:p.name, qty:`${totalRounded} lbs`, tags:['PREP'], raw:totalRounded});
    }
  });
  
  const grains = [];
  carbs.forEach((c,i) => {
    let grams = mealsPerCarb * carbPerPerson;
    const totalCups = grams / 185;
    const totalRounded = Math.ceil(totalCups * 2) / 2;
    const leftKey = `carb-${i}`;
    const left = state.leftovers[leftKey];
    if(left && left.amount > 0) {
      const need = Math.max(totalRounded - left.amount, 0);
      const needRounded = Math.ceil(need * 2) / 2;
      grains.push({name:c.name, qty:`${needRounded} cups (dry) <span style="color:var(--text3);font-weight:400;font-size:0.85em;">(need ${totalRounded}, have ${left.amount})</span>`, tags:['PREP'], raw:needRounded});
    } else {
      grains.push({name:c.name, qty:`${totalRounded} cups (dry)`, tags:['PREP'], raw:totalRounded});
    }
  });
  
  const produce = [];
  vegs.forEach((v,i) => {
    const leftKey = `veg-${i}`;
    const left = state.leftovers[leftKey];
    const cupsNeeded = totalPortions * 1;
    const perVeg = cupsNeeded / vegs.length;
    const isCanned = v.toLowerCase().includes('canned') || v.toLowerCase().includes('beans') || v.toLowerCase().includes('edamame');
    const totalUnits = isCanned ? Math.ceil(perVeg/2) : Math.max(1, Math.ceil(perVeg / 3));
    const unitLabel = isCanned ? 'cans' : (totalUnits>1?'units':'unit');
    
    if(left && left.amount > 0) {
      const need = Math.max(totalUnits - left.amount, 0);
      const needRounded = Math.ceil(need);
      produce.push({name:v, qty:`${needRounded} ${unitLabel} <span style="color:var(--text3);font-weight:400;font-size:0.85em;">(need ${totalUnits}, have ${left.amount})</span>`, tags:['PREP']});
    } else {
      produce.push({name:v, qty:`${totalUnits} ${unitLabel}`, tags:['PREP']});
    }
  });
  
  // Sauce fresh ingredients (weekly sauces)
  const neededStaples = [];
  state.selectedSauces.forEach(sauce => {
    if(!sauce) return;
    (sauce.freshIngredients||[]).forEach(fi => {
      produce.push({name:fi, qty:'', tags:['SAUCE']});
    });
    (sauce.pantryStaples||[]).forEach(ps => {
      if(!state.pantryChecklist[ps]) neededStaples.push(ps);
    });
    if(sauce.groceryFresh) {
      sauce.groceryFresh.forEach(gf => {
        produce.push({name:gf, qty:'', tags:['SAUCE']});
      });
    }
  });

  // Daily dinner extras: any sauce the user picked beyond the weekly 2, plus per-day rubs
  const weeklySauceNames = new Set(state.selectedSauces.filter(Boolean).map(s => s.name));
  const addedDinnerSauces = new Set();
  const addedDinnerRubs = new Set();
  Object.values(state.dinnerMethods || {}).forEach(dm => {
    if(!dm) return;
    // Extra sauces (user expanded beyond weekly pool)
    if(dm.sauce && !weeklySauceNames.has(dm.sauce.name) && !addedDinnerSauces.has(dm.sauce.name)) {
      addedDinnerSauces.add(dm.sauce.name);
      (dm.sauce.freshIngredients||[]).forEach(fi => produce.push({name:fi, qty:'', tags:['SAUCE']}));
      (dm.sauce.pantryStaples||[]).forEach(ps => {
        if(!state.pantryChecklist[ps] && !neededStaples.includes(ps)) neededStaples.push(ps);
      });
      if(dm.sauce.groceryFresh) {
        dm.sauce.groceryFresh.forEach(gf => produce.push({name:gf, qty:'', tags:['SAUCE']}));
      }
    }
    // Rubs (daily choice)
    if(dm.rub && !addedDinnerRubs.has(dm.rub.name)) {
      addedDinnerRubs.add(dm.rub.name);
      dm.rub.ingredients.split(',').map(s=>s.trim()).forEach(ing => {
        if(!state.pantryChecklist[ing] && !neededStaples.includes(ing)) {
          neededStaples.push(ing);
        }
      });
    }
  });
  
  // Snack
  const snackItems = [];
  if(state.selectedSnack && state.selectedSnack.groceryItems) {
    state.selectedSnack.groceryItems.forEach(gi => {
      const target = gi.section==='produce'?produce:gi.section==='dairy'?[]:gi.section==='grains'?grains:snackItems;
      target.push({name:gi.item, qty:gi.qty?`${gi.qty} ${gi.unit}`.trim():'', tags:['SNACK']});
    });
  }
  
  // Athlete essentials (unchecked)
  const athlete = state.athleteEssentials.filter(e => !state.athleteChecklist[e]);
  
  return { produce, meat, dairy:[], grains, pantry:neededStaples.map(s=>({name:s,qty:'',tags:['SAUCE']})), athlete:athlete.map(a=>({name:a,qty:'',tags:[]})), snackItems, neededStaples };
}

function renderPantryChecklist(needed) {
  // Collect all possible staples from sauces + rubs
  let allStaples = new Set();
  ['salt','black pepper','olive oil','soy sauce','garlic powder','onion powder'].forEach(s=>allStaples.add(s));
  state.sauces.forEach(s => (s.pantryStaples||[]).forEach(p => allStaples.add(p)));
  state.rubs.forEach(r => r.ingredients.split(',').map(s=>s.trim()).forEach(i => allStaples.add(i)));
  
  // Only show staples relevant to this week's selections
  let relevantStaples = new Set();
  state.selectedSauces.forEach(s => {
    if(s && s.pantryStaples) s.pantryStaples.forEach(p => relevantStaples.add(p));
  });
  // Per-day dinner rubs and expanded sauces
  Object.values(state.dinnerMethods || {}).forEach(dm => {
    if(!dm) return;
    if(dm.sauce && dm.sauce.pantryStaples) {
      dm.sauce.pantryStaples.forEach(p => relevantStaples.add(p));
    }
    if(dm.rub) {
      dm.rub.ingredients.split(',').map(s=>s.trim()).forEach(i => relevantStaples.add(i));
    }
  });
  // Always show baseline
  ['salt','black pepper','olive oil','soy sauce','garlic powder','onion powder'].forEach(s=>relevantStaples.add(s));
  
  const sorted = [...relevantStaples].sort((a,b) => {
    const aChecked = state.pantryChecklist[a]||false;
    const bChecked = state.pantryChecklist[b]||false;
    if(aChecked && !bChecked) return -1;
    if(!aChecked && bChecked) return 1;
    return a.localeCompare(b);
  });
  
  return sorted.map(item => {
    const checked = state.pantryChecklist[item] || false;
    return `<div class="checklist-item ${checked?'checked':''}" onclick="togglePantry('${item.replace(/'/g,"\\'")}')">
      <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();togglePantry('${item.replace(/'/g,"\\'")}')">
      <span class="checklist-label">${item}</span>
    </div>`;
  }).join('');
}

function togglePantry(item) {
  state.pantryChecklist[item] = !state.pantryChecklist[item];
  saveLS();
  renderPhase(4);
}

function renderAthleteEssentials() {
  return state.athleteEssentials.map(item => {
    const checked = state.athleteChecklist[item] || false;

  }).join('');
}

function renderNutritionNotes() {
  const notes = [];
  const proteins = state.weekIngredients.proteins.map(p=>(p.name||p).toLowerCase());
  const vegs = state.weekIngredients.vegetables.map(v=>v.toLowerCase());
  const carbs = state.weekIngredients.carbs.map(c=>(c.name||c).toLowerCase());
  const snackName = state.selectedSnack ? state.selectedSnack.name.toLowerCase() : '';
  
  // Omega-3
  const hasFattyFish = proteins.some(p => ['salmon','mackerel','sardine'].some(f=>p.includes(f)));
  if(!hasFattyFish) notes.push({type:'omega3', msg:'Low omega-3 week. Your fish oil supplement covers this, or consider adding canned salmon to snacks.'});
  
  // Calcium
  const hasDairy = snackName.includes('yogurt') || snackName.includes('cottage');
  if(!hasDairy) notes.push({type:'calcium', msg:'Calcium is light this week. Consider Greek yogurt bowl as your snack, or add a glass of milk.'});
  
  // Iron
  const hasRedMeat = proteins.some(p => RED_MEAT.some(rm=>p.includes(rm)));
  const hasDarkGreens = vegs.some(v => ['kale','spinach','broccolini'].some(g=>v.includes(g)));
  if(!hasRedMeat && !hasDarkGreens) notes.push({type:'iron', msg:'Iron is lower this week. Pair vitamin-C-rich vegetables with meals to maximize absorption from grains.'});
  
  // Vitamin D
  const hasVitDFish = proteins.some(p => ['salmon','mackerel','cod','sardine'].some(f=>p.includes(f)));
  if(!hasVitDFish) notes.push({type:'vitd', msg:'No major vitamin D food sources this week. Sunlight and supplementation are your main sources.'});
  
  // Fiber
  const highFiberItems = ['lentils','edamame','black beans','broccoli','broccolini'];
  const modFiberItems = ['quinoa','sweet potato','snap peas','carrots'];
  const allItems = [...vegs, ...carbs];
  const hasHighFiber = allItems.some(i => highFiberItems.some(h=>i.includes(h)));
  const hasModFiber = allItems.some(i => modFiberItems.some(m=>i.includes(m)));
  
  if(hasHighFiber) {
    notes.push({type:'fiber', msg:'Good fiber week — your meals should hit 20+ grams from food alone.'});
  } else if(hasModFiber) {
    notes.push({type:'fiber', msg:'Moderate fiber — consider adding extra vegetables at meals or supplementing with psyllium husk.'});
  } else {
    notes.push({type:'fiber', msg:'Lower fiber this week — your psyllium husk supplement is especially important. Add extra veg servings where possible.'});
  }
  
  return notes.slice(0,4).map(n => `<div class="nutrition-note ${n.type}">${n.msg}</div>`).join('') || '<div style="color:var(--text3);font-size:0.85rem;">No gaps detected this week — nice balance!</div>';
}

function renderWeeklyEatingPlan() {
  if(!calcTDEE() || !state.healthRecsMode) return '';
  
  const weekData = {
    proteins: state.weekIngredients.proteins,
    carbs: state.weekIngredients.carbs,
    vegetables: state.weekIngredients.vegetables
  };
  const { daily, gaps } = getQuantitativeGaps(weekData);
  
  // Build specific recommendations per food item
  const tips = [];
  const proteins = state.weekIngredients.proteins;
  const carbs = state.weekIngredients.carbs;
  const vegs = state.weekIngredients.vegetables;
  
  // Identify the nutrient MVPs — which items contribute most to which nutrients
  const itemContributions = {};
  
  [...proteins.map(p=>p.name), ...carbs.map(c=>c.name), ...vegs].forEach(name => {
    const profile = NUTRIENT_DB[name];
    if(!profile || !profile.micros) return;
    itemContributions[name] = {};
    Object.keys(DAILY_TARGETS).forEach(key => {
      const val = profile.micros[key] || 0;
      if(val > 0) itemContributions[name][key] = val;
    });
  });
  
  // For each nutrient near or below target, identify which food is the primary source
  const criticalNutrients = gaps.filter(g => g.severity === 'critical').map(g => g.key);
  const lowNutrients = gaps.filter(g => g.severity === 'low').map(g => g.key);
  const watchNutrients = [...criticalNutrients, ...lowNutrients];
  
  // Find which vegs are highest-value and should be prioritized
  const vegScores = vegs.map(v => {
    const profile = NUTRIENT_DB[v];
    if(!profile || !profile.micros) return { name:v, score:0, topNutrients:[] };
    let score = 0;
    const topN = [];
    Object.keys(profile.micros).forEach(k => {
      if(!DAILY_TARGETS[k]) return;
      const contribution = profile.micros[k] / DAILY_TARGETS[k].amount;
      if(contribution > 0.1) { // contributes >10% DV per 100g
        score += contribution;
        if(contribution > 0.2) topN.push(DAILY_TARGETS[k].label);
      }
      // Extra points if this nutrient is a gap
      if(watchNutrients.includes(k)) score += contribution * 2;
    });
    return { name:v, score:Math.round(score*100)/100, topNutrients:topN };
  });
  
  vegScores.sort((a,b) => b.score - a.score);
  
  // Generate frequency recommendations
  const totalMeals = state.calendar.reduce((acc,d) => acc + (d.lunch>0?1:0) + (d.dinner>0?1:0), 0);
  
  vegScores.forEach((vs, i) => {
    if(i === 0 && vs.score > 0) {
      const freq = Math.min(totalMeals, Math.ceil(totalMeals * 0.7));
      tips.push({
        item: vs.name,
        priority: 'high',
        msg: `Include in ${freq} of ${totalMeals} meals this week`,
        reason: vs.topNutrients.length > 0 ? `Your best source of ${vs.topNutrients.join(', ')}` : 'Highest nutrient density of your veg picks'
      });
    } else if(i === 1 && vs.score > 0) {
      const freq = Math.min(totalMeals, Math.ceil(totalMeals * 0.5));
      tips.push({
        item: vs.name,
        priority: 'medium',
        msg: `Include in ${freq} of ${totalMeals} meals`,
        reason: vs.topNutrients.length > 0 ? `Good source of ${vs.topNutrients.join(', ')}` : 'Second-highest nutrient density'
      });
    } else if(vs.score > 0) {
      tips.push({
        item: vs.name,
        priority: 'low',
        msg: `Rotate in 2-3 times for variety`,
        reason: vs.topNutrients.length > 0 ? `Contributes ${vs.topNutrients.join(', ')}` : 'Adds diversity'
      });
    }
  });
  
  // Protein pairing tips
  proteins.forEach(p => {
    const profile = NUTRIENT_DB[p.name];
    if(!profile) return;
    if(profile.foodGroup === 'fish-fatty') {
      tips.push({ item:p.name, priority:'high', msg:'Eat at least 3 servings this week', reason:'Primary omega-3 and vitamin D source — front-load early in the week' });
    }
    if(profile.foodGroup === 'red-meat') {
      tips.push({ item:p.name, priority:'medium', msg:'Pair with vitamin C-rich veg (bell peppers, broccoli) to boost iron absorption', reason:'Heme iron from red meat + vitamin C = maximum absorption' });
    }
    if(profile.foodGroup === 'plant-protein') {
      tips.push({ item:p.name, priority:'medium', msg:'Pair with whole grains for complete amino acid profile', reason:'Plant proteins benefit from grain complementation' });
    }
  });
  
  // Carb pairing tips
  carbs.forEach(c => {
    const profile = NUTRIENT_DB[c.name];
    if(!profile) return;
    if(profile.foodGroup === 'legume') {
      tips.push({ item:c.name, priority:'high', msg:'Include in at least 4 meals — this is a fiber and folate powerhouse', reason:'Legumes are among the most nutrient-dense carb sources' });
    }
    if(profile.foodGroup === 'refined-grain') {
      tips.push({ item:c.name, priority:'low', msg:'Fine for quick energy but pair with nutrient-dense veg', reason:'Low micronutrient content — let the vegetables carry the nutritional load at these meals' });
    }
  });
  
  // Supplement reminders based on gaps
  const suppTips = [];
  if(!gaps.some(g => g.key === 'omega3')) {
    suppTips.push('✓ Fish oil is covering your omega-3 — keep taking it with breakfast');
  }
  if(!gaps.some(g => g.key === 'fiber') || daily.fiber >= 25) {
    suppTips.push('✓ Psyllium husk 2x daily is keeping fiber on target');
  } else {
    suppTips.push('⚠️ Even with psyllium husk, fiber is below target — add extra veg servings or choose legumes more often');
  }
  if(gaps.some(g => g.key === 'vitD')) {
    suppTips.push('💊 Consider adding a Vitamin D3 supplement (2,000-4,000 IU) — food sources alone aren\'t covering it this week');
  }
  
  if(tips.length === 0 && suppTips.length === 0) return '';
  
  const priorityColors = { high:'var(--green)', medium:'var(--yellow)', low:'var(--text3)' };
  const priorityBg = { high:'var(--green-soft)', medium:'var(--yellow-soft)', low:'var(--bg2)' };
  
  return `
    <div class="card">
      <div class="card-title">📋 Weekly Eating Plan</div>
      <div class="card-subtitle">How to distribute your ingredients across meals for the healthiest week possible.</div>
      
      ${tips.map(t => `
        <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 10px;margin-bottom:6px;border-radius:var(--radius-sm);background:${priorityBg[t.priority]};">
          <div style="min-width:6px;height:100%;border-radius:3px;background:${priorityColors[t.priority]};align-self:stretch;"></div>
          <div>
            <div style="font-weight:600;font-size:0.9rem;">${t.item}</div>
            <div style="font-size:0.85rem;color:var(--text);">${t.msg}</div>
            <div style="font-size:0.75rem;color:var(--text3);">${t.reason}</div>
          </div>
        </div>
      `).join('')}
      
      ${suppTips.length > 0 ? `
        <div class="section-divider"></div>
        <div style="font-size:0.85rem;font-weight:600;margin-bottom:6px;">💊 Supplement Check</div>
        ${suppTips.map(s => `<div style="font-size:0.85rem;padding:4px 0;">${s}</div>`).join('')}
      ` : ''}
    </div>`;
}

function renderMealBreakdown() {
  const tdee = calcTDEE();
  if(!tdee) return '<div class="warning warning-yellow">Set your body stats via the 🏋️ button in the header for personalized portions.</div>';
  
  const totalMealsPerDay = state.calendar.map(d => (d.lunch>0?1:0) + (d.dinner>0?1:0));
  
  return state.calendar.map((day, i) => {
    if(day.lunch===0 && day.dinner===0) return '';
    const mealsToday = (day.lunch>0?1:0) + (day.dinner>0?1:0);
    const calPerMeal = Math.round(tdee.goalCal / Math.max(mealsToday,1));
    const prot1 = state.weekIngredients.proteins[0];
    const prot2 = state.weekIngredients.proteins[1] || prot1;
    const carb1 = state.weekIngredients.carbs[0];
    const carb2 = state.weekIngredients.carbs[1] || carb1;
    const sauce = state.selectedSauces[0];
    const sauce2 = state.selectedSauces[1] || sauce;
    
    const training = day.training || 'None';
    let trainingTag = '';
    if(training !== 'None' && training !== 'Rest Day') {
      // figure out pre/post
      const timeOrder = {Morning:1,Afternoon:2,Evening:3};
      const tTime = timeOrder[training]||2;
      if(day.lunch>0 && tTime >= 2) trainingTag = '<span class="workout-tag pre">[PRE-WORKOUT]</span>';
      else if(day.dinner>0 && tTime <= 2) trainingTag = '<span class="workout-tag post">[POST-WORKOUT]</span>';
    }
    if(training === 'Rest Day') trainingTag = '<span class="workout-tag rest">[REST DAY]</span>';
    
    let html = `<div class="meal-day"><div class="meal-day-title">${DAYS_FULL[i]} ${trainingTag}</div>`;
    if(day.lunch > 0) {
      const protGrams = Math.round((tdee.proteinG / mealsToday * 4) / (prot1.protein||22) * 100 / 28.35);
      html += `<div class="meal-detail">🍱 <strong>Lunch</strong> (${day.lunch} ${day.lunch>1?'people':'person'}): ${prot1.name} + ${carb1.name} + vegs, ${sauce?sauce.name+' sauce':''}</div>`;
      html += `<div class="meal-your-portion">Your plate: ~${Math.round(tdee.proteinG/mealsToday)}g protein, ~${Math.round(tdee.carbG/mealsToday)}g carbs, ~${Math.round(tdee.fatG/mealsToday)}g fat = ${calPerMeal} cal</div>`;
    }
    if(day.dinner > 0) {
      const dm = state.dinnerMethods[i];
      // Pull what's set for this day, falling back to weekly defaults where empty
      const dinProtein = (dm && dm.protein) || (prot2 ? prot2.name : null);
      const dinSauce = (dm && dm.sauce) || sauce2;
      let dinMethod = dm && dm.method;
      if(!dinMethod) {
        // Fall back to that protein's weekly batch method
        const pIdx = state.weekIngredients.proteins.findIndex(p => p.name === dinProtein);
        if(pIdx >= 0) dinMethod = state.batchMethods[pIdx];
        if(!dinMethod) dinMethod = state.batchMethods[1] || state.batchMethods[0];
      }
      const dinRub = dm && dm.rub;
      const cookLabel = dm && dm.cookType === 'fresh' ? ' (fresh)' : '';
      const rubLabel = dinRub ? `, ${dinRub.name} rub` : '';
      html += `<div class="meal-detail">🍽️ <strong>Dinner</strong> (${day.dinner} ${day.dinner>1?'people':'person'}): ${dinProtein || '?'} + ${carb2?carb2.name:''} + vegs${dinSauce?', '+dinSauce.name+' sauce':''}${dinMethod?' — '+dinMethod.name+cookLabel:''}${rubLabel}</div>`;
      html += `<div class="meal-your-portion">Your plate: ~${Math.round(tdee.proteinG/mealsToday)}g protein, ~${Math.round(tdee.carbG/mealsToday)}g carbs, ~${Math.round(tdee.fatG/mealsToday)}g fat = ${calPerMeal} cal</div>`;
    }
    html += '</div>';
    return html;
  }).join('') + (state.selectedSnack ? `<div class="meal-day"><div class="meal-day-title">🍎 Featured Snack</div><div class="meal-detail">${state.selectedSnack.name} — ${state.selectedSnack.ingredients}</div></div>` : '');
}

function sendToReminders() {
  const data = buildGroceryList();
  const sections = [
    {title:'Produce', items:data.produce},
    {title:'Meat & Seafood', items:data.meat},
    {title:'Grains & Dry Goods', items:data.grains},
    {title:'Pantry & Condiments', items:[...(data.pantry||[]),...(data.snackItems||[])]},
    {title:'Athlete Essentials', items:data.athlete}
  ];
  
  const w = state.rotation[state.currentWeekIdx % state.rotation.length];
  const weekName = w ? (w.letter || w.name) : 'Week '+(state.currentWeekIdx+1);
  const now = new Date();
  const timestamp = now.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  
  // Build .ics with VTODO entries
  let ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//PrepWeek//Grocery List//EN',
    'X-WR-CALNAME:Groceries — ' + weekName,
    'METHOD:PUBLISH'
  ];
  
  let idx = 0;
  let itemCount = 0;
  sections.filter(s => s.items && s.items.length > 0).forEach(section => {
    section.items.forEach(item => {
      const name = item.name + (item.qty ? ', ' + item.qty.replace(/<[^>]+>/g,'') : '');
      const tags = (item.tags||[]).map(t=>'['+t+']').join(' ');
      const summary = escapeICS(name + (tags ? ' ' + tags : ''));
      const uid = 'prepweek-' + timestamp + '-' + (idx++);
      
      ics.push('BEGIN:VTODO');
      ics.push('UID:' + uid);
      ics.push('DTSTAMP:' + timestamp);
      ics.push('SUMMARY:' + summary);
      ics.push('CATEGORIES:' + escapeICS(section.title));
      ics.push('STATUS:NEEDS-ACTION');
      ics.push('END:VTODO');
      itemCount++;
    });
  });
  
  ics.push('END:VCALENDAR');
  
  const icsContent = ics.join('\r\n');
  const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
  const filename = 'PrepWeek_Groceries_' + weekName.replace(/\s+/g,'_') + '.ics';
  
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const isMac = /Macintosh/.test(navigator.userAgent);
  const isApple = isIOS || isMac;
  
  if(isIOS) {
    // Strategy 1: Web Share API with file (most seamless on iOS 15+)
    // Opens the share sheet → user taps Reminders → items import
    if(navigator.canShare) {
      const file = new File([blob], filename, { type: 'text/calendar' });
      if(navigator.canShare({ files: [file] })) {
        navigator.share({
          title: 'Grocery List — ' + weekName,
          files: [file]
        }).then(() => {
          showToast('✓ ' + itemCount + ' items sent!');
        }).catch((err) => {
          if(err.name !== 'AbortError') {
            // Share failed, try data URL fallback
            openICSDataUrl(icsContent, filename);
          }
        });
        showLongToast('Tap <strong>"Reminders"</strong> in the share sheet to import ' + itemCount + ' items as a checklist.', 5000);
        return;
      }
    }
    // Strategy 2: Open as data URL — Safari handles .ics natively
    openICSDataUrl(icsContent, filename);
    showLongToast('When prompted, tap <strong>"Add All"</strong> to import ' + itemCount + ' items to Reminders.', 5000);
  } else if(isMac) {
    // macOS: download triggers native handling via Calendar/Reminders
    downloadBlob(blob, filename);
    showLongToast('Open the downloaded file — macOS will offer to import into Reminders.', 4000);
  } else {
    // Non-Apple: download the file
    downloadBlob(blob, filename);
    showToast('Downloaded ' + filename);
  }
}

function openICSDataUrl(icsContent, filename) {
  // Convert to base64 data URL and open it
  // iOS Safari intercepts text/calendar URLs and opens the native handler
  const base64 = btoa(unescape(encodeURIComponent(icsContent)));
  const dataUrl = 'data:text/calendar;base64,' + base64;
  window.open(dataUrl, '_blank');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function showLongToast(html, duration) {
  const t = document.getElementById('copyToast');
  t.innerHTML = html;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 3000);
}

function escapeICS(text) {
  // iCalendar text escaping: backslash, semicolons, commas, newlines
  return text
    .replace(/\\/g, '\\\\')
    .replace(/;/g, '\\;')
    .replace(/,/g, '\\,')
    .replace(/\n/g, '\\n');
}

      mode: 'no-cors',  // Apps Script doesn't support CORS preflight
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    
    // no-cors means we can't read the response, so we optimistically confirm
    // If there's an error, the tasks just won't appear and user can retry
    btnText.textContent = '✓ Sent!';
    showLongToast('<strong>' + tasks.length + ' items</strong> sent to Google Tasks! Open the Tasks app to see your list.', 4000);
    
    setTimeout(() => {
      btn.disabled = false;
      btnText.textContent = '📋 Google Tasks';
    }, 3000);
    
  } catch (err) {
    console.error('Google Tasks error:', err);
    btn.disabled = false;
    btnText.textContent = '📋 Google Tasks';
    showLongToast('Failed to send to Google Tasks. Check your connection and try again.', 4000);
  }
}

// ============================================================
async function saveWeek() {
  const entry = {
    date: new Date().toISOString(),
    rotationWeek: state.currentWeekIdx,
    ingredients: JSON.parse(JSON.stringify(state.weekIngredients)),
    calendar: JSON.parse(JSON.stringify(state.calendar)),
    batchMethods: JSON.parse(JSON.stringify(state.batchMethods)), // per-protein
    batchMethod: state.batchMethods[0] || null, // legacy field for older readers
    sauces: state.selectedSauces,
    rubs: state.selectedRubs,
    snack: state.selectedSnack,
    dinnerMethods: state.dinnerMethods,
    macros: calcTDEE(),
    groceryList: buildGroceryText()
  };
  
  await dbAdd('history', entry);
  
  state.completedWeeks++;
  state.weekSetupComplete = true;
  state.weekSetupDate = new Date().toISOString();
  saveLS();
  
  await loadFromDB();
  
  showToast('Week saved! Switching to This Week dashboard.');
  setTimeout(()=>renderDashboard(), 1000);
}

// ============================================================
// QUICK START
// ============================================================
function quickStart() {
  // Check prerequisites
  const missing = [];
  const d = state.defaults;
  if(!d.weight || !d.height_ft || !d.age) missing.push('Body stats (weight, height, age) — tap 🏋️ in the header');
  if(!state.calendarTemplate) missing.push('A saved calendar template — set your meal schedule in Phase 1 and tap "Save as Default"');
  
  if(missing.length > 0) {
    const html = `
      <div class="modal-header">
        <div class="modal-title">⚡ Quick Start Setup</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:16px;">Quick Start needs a couple things saved before it can auto-generate your week:</p>
        ${missing.map(m => `<div class="warning warning-yellow" style="margin-bottom:8px;">📋 ${m}</div>`).join('')}
        <p style="margin-top:16px;font-size:0.85rem;color:var(--text2);">Complete one full week manually (Phases 1–4) and these will be saved automatically. After that, Quick Start will generate everything in one tap.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="closeModal();goToPhase(1);">Go to Phase 1</button>
      </div>
    `;
    showModal(html);
    return;
  }

  // Auto-advance to suggested week
  const w = state.rotation[state.currentWeekIdx % state.rotation.length];
  state.weekIngredients = { proteins:[...w.proteins], carbs:[...w.carbs], vegetables:[...w.vegetables] };
  
  // Load calendar template
  if(state.calendarTemplate) state.calendar = JSON.parse(JSON.stringify(state.calendarTemplate));
  
  // Auto-pick per-protein batch methods and sauces
  state.batchMethods = [null, null];
  state.selectedSauces = [null, null];
  state.selectedRubs = [null, null];

  state.weekIngredients.proteins.forEach((protein, pi) => {
    // Batch method for this protein
    const methodPool = getFilteredBatchMethodsForProtein(pi);
    if(methodPool.length > 0) {
      state.batchMethods[pi] = methodPool[Math.floor(Math.random() * methodPool.length)];
    } else {
      // Fallback: any batch method
      const anyBatch = state.methods.filter(m => m.type === 'batch');
      state.batchMethods[pi] = anyBatch.length > 0 ? anyBatch[Math.floor(Math.random() * anyBatch.length)] : null;
    }
    // Sauce for this protein (protein 1 diverges from protein 0's cuisine)
    const saucePool = getFilteredSaucesForProtein(pi);
    if(saucePool.length > 0) {
      state.selectedSauces[pi] = saucePool[Math.floor(Math.random() * saucePool.length)];
    }
  });
  
  // Auto-pick snack
  state.selectedSnack = state.snacks[Math.floor(Math.random()*state.snacks.length)];
  
  // Auto-pick dinner proteins and methods
  state.dinnerMethods = {};
  const proteins = state.weekIngredients.proteins;
  state.calendar.forEach((d,i) => {
    if(d.dinner > 0 && proteins.length > 0) {
      const pick = proteins[Math.random() < 0.5 ? 0 : Math.min(1, proteins.length-1)];
      const finishPool = getFilteredFinishingMethods(pick.name);
      state.dinnerMethods[i] = {
        protein: pick.name,
        method: finishPool.length > 0 ? finishPool[Math.floor(Math.random()*finishPool.length)] : null
      };
    }
  });
  
  goToPhase(4);
}

// ============================================================
// HISTORY
// ============================================================
function showHistory() {
  let html = `
    <div class="modal-header">
      <div class="modal-title">📋 Meal Prep History</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
  `;
  
  if(state.history.length === 0) {
    html += '<div class="empty-state">No completed weeks yet. Finish your first week to see history here.</div>';
  } else {
    html += state.history.map(entry => {
      const date = new Date(entry.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      const w = state.rotation[entry.rotationWeek % state.rotation.length];
      const weekName = w ? (w.letter||w.name) : 'Week '+(entry.rotationWeek+1);
      const proteinsArr = entry.ingredients?.proteins || [];
      const proteins = proteinsArr.map(p=>p.name||p).join(', ');
      // Build method display — prefer new batchMethods array, fall back to legacy batchMethod
      let methodLine = '—';
      if(Array.isArray(entry.batchMethods) && entry.batchMethods.some(Boolean)) {
        methodLine = entry.batchMethods.map((m, pi) => {
          const pName = proteinsArr[pi]?.name || proteinsArr[pi] || `Protein ${pi+1}`;
          return m ? `${pName}: ${m.name}` : `${pName}: —`;
        }).join(' · ');
      } else if(entry.batchMethod?.name) {
        methodLine = entry.batchMethod.name;
      }
      return `<div class="history-entry">
        <div class="history-header" onclick="this.nextElementSibling.classList.toggle('show')">
          <div><strong>${date}</strong> — ${weekName}<br><span style="font-size:0.8rem;color:var(--text3);">${proteins}</span></div>
          <div style="display:flex;gap:6px;align-items:center;">
            <button class="btn-sm btn-swap" style="background:var(--green-soft);color:var(--green);font-weight:600;" onclick="event.stopPropagation();loadWeekFromHistory(${entry.id})">▶ Load</button>
            <button class="btn-sm btn-swap" onclick="event.stopPropagation();deleteHistory(${entry.id})">🗑️</button>
          </div>
        </div>
        <div class="history-details">
          <p style="font-size:0.85rem;margin-bottom:8px;"><strong>Methods:</strong> ${methodLine}</p>
          <p style="font-size:0.85rem;margin-bottom:8px;"><strong>Sauces:</strong> ${(entry.sauces||[]).map(s=>s?.name).filter(Boolean).join(', ')||'—'}</p>
          <p style="font-size:0.85rem;margin-bottom:8px;"><strong>Snack:</strong> ${entry.snack?.name||'—'}</p>
          ${entry.macros?`<p style="font-size:0.85rem;"><strong>Targets:</strong> ${entry.macros.goalCal} cal · ${entry.macros.proteinG}g P · ${entry.macros.carbG}g C · ${entry.macros.fatG}g F</p>`:''}
          <div style="margin-top:10px;">
            <button class="btn btn-primary btn-block" style="padding:10px;" onclick="loadWeekFromHistory(${entry.id})">▶ Load this week & go to Daily View</button>
          </div>
        </div>
      </div>`;
    }).join('');
    
    html += `<div style="margin-top:16px;text-align:center;">
      <button class="btn btn-outline" onclick="clearAllHistory()" style="color:var(--red);border-color:var(--red);">Clear All History</button>
    </div>`;
  }
  
  html += `
      <div class="section-divider" style="margin-top:20px;"></div>
      <div class="form-group">
        <label class="form-label">Restart Rotation From:</label>
        <select class="form-select" onchange="restartRotation(this.value)">
          ${state.rotation.map((r,i)=>`<option value="${i}" ${i===state.currentWeekIdx?'selected':''}>${r.letter||r.name||'Week '+(i+1)}</option>`).join('')}
        </select>
      </div>
    </div>
  `;
  showModal(html);
}

async function deleteHistory(id) {
  if(!confirm('Delete this entry?')) return;
  await dbDelete('history', id);
  await loadFromDB();
  showHistory();
}

function loadWeekFromHistory(id) {
  const entry = state.history.find(h => h.id === id);
  if(!entry) { showToast('Entry not found'); return; }

  // Restore all week state from the saved entry
  state.weekIngredients = JSON.parse(JSON.stringify(entry.ingredients || { proteins:[], carbs:[], vegetables:[] }));
  state.calendar = JSON.parse(JSON.stringify(entry.calendar || state.calendar));
  state.batchMethods = JSON.parse(JSON.stringify(
    Array.isArray(entry.batchMethods) ? entry.batchMethods : [entry.batchMethod || null, null]
  ));
  state.selectedSauces = JSON.parse(JSON.stringify(entry.sauces || [null, null]));
  state.selectedRubs = JSON.parse(JSON.stringify(entry.rubs || [null, null]));
  state.selectedSnack = entry.snack ? JSON.parse(JSON.stringify(entry.snack)) : null;
  state.dinnerMethods = JSON.parse(JSON.stringify(entry.dinnerMethods || {}));
  state.currentWeekIdx = entry.rotationWeek ?? state.currentWeekIdx;

  // Mark the week as active/complete so dashboard is available
  state.weekSetupComplete = true;
  state.weekSetupDate = entry.date;
  saveLS();

  closeModal();
  showToast('Week loaded — opening daily view');
  setTimeout(() => renderDashboard(), 400);
}

async function clearAllHistory() {
  if(!confirm('Clear ALL history? This cannot be undone.')) return;
  await dbClear('history');
  state.history = [];
  showHistory();
}

function restartRotation(idx) {
  state.currentWeekIdx = parseInt(idx);
  saveLS();
  showToast('Rotation restarted from week '+(parseInt(idx)+1));
}

  return `
    <div style="background:var(--bg);border-radius:var(--radius-sm);padding:16px;margin-top:12px;">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center;">

        <div><div style="font-size:1.3rem;font-weight:700;color:var(--red);">${t.proteinG}g</div><div style="font-size:0.75rem;color:var(--text3);">Protein</div></div>
        <div><div style="font-size:1.3rem;font-weight:700;color:var(--yellow);">${t.carbG}g</div><div style="font-size:0.75rem;color:var(--text3);">Carbs</div></div>

}

async function resetToDefaults() {
  if(!confirm('Reset all rotation, sauces, methods, snacks, and rubs to defaults?')) return;
  await dbClear('rotation');
  await dbClear('sauces');
  await dbClear('methods');
  await dbClear('snacks');
  await dbClear('rubs');
  await seedDefaults();
  await loadFromDB();
  state.currentWeekIdx = 0;
  saveLS();
  closeModal();
  goToPhase(1);
  showToast('Reset to defaults!');
}

// ============================================================
// MODAL & TOAST
// ============================================================
function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
});

function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

  origGoToPhase(n);

    setTimeout(drawAllWheels, 100);
  }
};
