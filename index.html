<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PrepWeek">
<title>Prep Week — Meal Prep System</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#D4603A">
<style>
  /* System font replacements — zero network dependency */
  @font-face {
    font-family: 'DM Sans';
    src: local('SF Pro Text'), local('SF Pro'), local('-apple-system'), local('BlinkMacSystemFont'), local('Segoe UI'), local('Helvetica Neue'), local('Arial');
    font-weight: 100 900;
    font-style: normal;
  }
  @font-face {
    font-family: 'Playfair Display';
    src: local('Georgia'), local('Times New Roman'), local('serif');
    font-weight: 600 700;
    font-style: normal;
  }
</style>
<style>
:root {
  --bg: #FAF7F2;
  --bg2: #F2EDE5;
  --bg3: #E8E1D6;
  --card: #FFFFFF;
  --text: #2D2A26;
  --text2: #6B6560;
  --text3: #9B9590;
  --accent: #D4603A;
  --accent2: #B8472A;
  --accent-soft: #F5DDD4;
  --green: #4A8B5C;
  --green-soft: #D4EDDA;
  --blue: #4A7BB5;
  --blue-soft: #D4E4F0;
  --yellow: #C4960C;
  --yellow-soft: #FFF3CD;
  --red: #C44A4A;
  --red-soft: #F8D7DA;
  --purple: #7B5EA7;
  --purple-soft: #E8DCEF;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --font-display: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --transition: 0.25s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.5; min-height:100vh; -webkit-overflow-scrolling:touch; }
button { font-family:var(--font); cursor:pointer; border:none; background:none; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
input, select { font-family:var(--font); font-size:16px; /* prevents iOS zoom on focus */ }

/* HEADER */
.app-header { background:var(--card); border-bottom:1px solid var(--bg3); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.app-logo { font-family:var(--font-display); font-size:1.4rem; color:var(--accent); font-weight:700; }
.app-logo span { color:var(--text); font-weight:600; }
.header-actions { display:flex; gap:8px; }
.header-btn { padding:8px 12px; border-radius:var(--radius-sm); font-size:0.85rem; font-weight:500; color:var(--text2); transition:var(--transition); }
.header-btn:hover { background:var(--bg2); color:var(--text); }
.header-btn.active { background:var(--accent-soft); color:var(--accent); }

/* PHASE NAV */
.phase-nav { display:flex; gap:4px; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--bg3); overflow-x:auto; }
.phase-tab { padding:8px 16px; border-radius:20px; font-size:0.8rem; font-weight:500; color:var(--text3); white-space:nowrap; transition:var(--transition); }
.phase-tab.active { background:var(--accent); color:white; }
.phase-tab.completed { background:var(--green-soft); color:var(--green); }
.phase-tab:not(.active):not(.completed):hover { background:var(--bg2); }

/* MAIN */
.main-content { max-width:800px; margin:0 auto; padding:20px; }
.phase-section { display:none; }
.phase-section.active { display:block; }

/* CARDS */
.card { background:var(--card); border-radius:var(--radius); padding:20px; margin-bottom:16px; box-shadow:var(--shadow); }
.card-title { font-family:var(--font-display); font-size:1.2rem; margin-bottom:12px; color:var(--text); }
.card-subtitle { font-size:0.85rem; color:var(--text2); margin-bottom:16px; }

/* TAGS */
.tag { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:600; }
.tag-protein { background:#FDEAE4; color:#C44A2A; }
.tag-carb { background:#FFF3CD; color:#8B6914; }
.tag-veg { background:#D4EDDA; color:#3A7B4C; }
.tag-prep { background:var(--blue-soft); color:var(--blue); }
.tag-dinner { background:var(--purple-soft); color:var(--purple); }
.tag-sauce { background:var(--yellow-soft); color:var(--yellow); }
.tag-snack { background:var(--green-soft); color:var(--green); }

/* INGREDIENT CARDS */
.ingredient-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px; }
.ingredient-card { background:var(--bg); border:2px solid var(--bg3); border-radius:var(--radius-sm); padding:12px; position:relative; transition:var(--transition); }
.ingredient-card:hover { border-color:var(--accent-soft); }
.ingredient-name { font-weight:600; font-size:0.95rem; margin-bottom:4px; }
.ingredient-macros { font-size:0.75rem; color:var(--text3); }
.ingredient-actions { display:flex; gap:6px; margin-top:8px; }
.btn-sm { padding:4px 10px; border-radius:6px; font-size:0.75rem; font-weight:500; transition:var(--transition); }
.btn-swap { background:var(--bg3); color:var(--text2); }
.btn-swap:hover { background:var(--accent-soft); color:var(--accent); }
.btn-leftover { background:var(--green-soft); color:var(--green); font-size:0.7rem; }
.btn-leftover.active { background:var(--green); color:white; }

/* FORM ELEMENTS */
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:0.85rem; font-weight:500; color:var(--text2); margin-bottom:6px; }
.form-input { width:100%; padding:10px 14px; border:2px solid var(--bg3); border-radius:var(--radius-sm); font-size:0.95rem; background:var(--bg); transition:var(--transition); }
.form-input:focus { outline:none; border-color:var(--accent); background:white; }
.form-select { width:100%; padding:10px 14px; border:2px solid var(--bg3); border-radius:var(--radius-sm); font-size:0.95rem; background:var(--bg); appearance:none; cursor:pointer; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* BUTTONS */
.btn { padding:12px 24px; border-radius:var(--radius-sm); font-size:0.95rem; font-weight:600; transition:var(--transition); }
.btn-primary { background:var(--accent); color:white; }
.btn-primary:hover { background:var(--accent2); transform:translateY(-1px); box-shadow:var(--shadow-lg); }
.btn-secondary { background:var(--bg2); color:var(--text); }
.btn-secondary:hover { background:var(--bg3); }
.btn-outline { border:2px solid var(--bg3); color:var(--text2); background:white; }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }
.btn-block { display:block; width:100%; text-align:center; }
.phase-actions { display:flex; gap:12px; margin-top:20px; justify-content:space-between; }

/* CALENDAR */
.calendar-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:8px; }
.cal-day { background:var(--bg); border-radius:var(--radius-sm); padding:10px 8px; text-align:center; }
.cal-day-name { font-size:0.7rem; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.cal-input { width:100%; padding:6px; border:1px solid var(--bg3); border-radius:6px; text-align:center; font-size:0.9rem; background:white; }
.cal-meal-label { font-size:0.65rem; color:var(--text3); margin-top:4px; margin-bottom:2px; }

/* WHEEL */
.wheel-container { display:flex; flex-direction:column; align-items:center; margin:20px 0; }
.wheel-wrapper { position:relative; width:300px; height:300px; margin-bottom:20px; }
.wheel-canvas { width:300px; height:300px; }
.wheel-pointer { position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:24px solid var(--accent); z-index:2; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
.wheel-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:50px; height:50px; background:white; border-radius:50%; box-shadow:var(--shadow-lg); display:flex; align-items:center; justify-content:center; z-index:2; font-size:1.2rem; }
.spin-btn { padding:14px 32px; border-radius:30px; font-size:1rem; font-weight:700; background:var(--accent); color:white; box-shadow:var(--shadow-lg); transition:var(--transition); }
.spin-btn:hover { background:var(--accent2); transform:scale(1.05); }
.spin-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.wheel-result { margin-top:16px; padding:16px; background:var(--accent-soft); border-radius:var(--radius-sm); text-align:center; font-weight:600; display:none; }
.wheel-result.show { display:block; animation:fadeInUp 0.4s ease; }

/* GROCERY LIST */
.grocery-section { margin-bottom:20px; }
.grocery-section-title { font-family:var(--font-display); font-size:1.1rem; padding:8px 0; border-bottom:2px solid var(--bg3); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.grocery-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-radius:var(--radius-sm); margin-bottom:4px; }
.grocery-item:hover { background:var(--bg); }
.grocery-qty { font-weight:600; color:var(--accent); min-width:80px; }
.grocery-tags { display:flex; gap:4px; }

/* CHECKLIST */
.checklist-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:var(--radius-sm); cursor:pointer; transition:var(--transition); }
.checklist-item:hover { background:var(--bg); }
.checklist-item input[type="checkbox"] { width:18px; height:18px; accent-color:var(--green); cursor:pointer; }
.checklist-item.checked { color:var(--text3); }
.checklist-item.checked .checklist-label { text-decoration:line-through; }

/* WARNING */
.warning { padding:12px 16px; border-radius:var(--radius-sm); margin-bottom:12px; font-size:0.85rem; display:flex; align-items:flex-start; gap:8px; }
.warning-red { background:var(--red-soft); color:#8B2A2A; }
.warning-yellow { background:var(--yellow-soft); color:#6B4D00; }
.warning-blue { background:var(--blue-soft); color:#2A5B8B; }
.warning-green { background:var(--green-soft); color:#2A6B3C; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:var(--card); border-radius:var(--radius); max-width:600px; width:100%; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
.modal-header { padding:20px; border-bottom:1px solid var(--bg3); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--card); z-index:1; border-radius:var(--radius) var(--radius) 0 0; }
.modal-title { font-family:var(--font-display); font-size:1.1rem; }
.modal-close { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:var(--text3); }
.modal-close:hover { background:var(--bg2); color:var(--text); }
.modal-body { padding:20px; }
.modal-footer { padding:16px 20px; border-top:1px solid var(--bg3); display:flex; gap:8px; justify-content:flex-end; }

/* HISTORY */
.history-entry { border:1px solid var(--bg3); border-radius:var(--radius-sm); margin-bottom:12px; overflow:hidden; }
.history-header { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:var(--transition); }
.history-header:hover { background:var(--bg); }
.history-details { padding:0 16px 16px; display:none; border-top:1px solid var(--bg3); }
.history-details.show { display:block; padding-top:12px; }

/* NUTRITION NOTE */
.nutrition-note { padding:10px 14px; border-radius:var(--radius-sm); margin-bottom:8px; font-size:0.85rem; border-left:3px solid; }
.nutrition-note.omega3 { border-color:var(--blue); background:var(--blue-soft); }
.nutrition-note.calcium { border-color:var(--yellow); background:var(--yellow-soft); }
.nutrition-note.iron { border-color:var(--red); background:var(--red-soft); }
.nutrition-note.vitd { border-color:var(--purple); background:var(--purple-soft); }
.nutrition-note.fiber { border-color:var(--green); background:var(--green-soft); }

/* SWAP DROPDOWN */
.swap-dropdown { position:absolute; top:100%; left:0; right:0; background:var(--card); border:2px solid var(--bg3); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); z-index:50; max-height:200px; overflow-y:auto; display:none; }
.swap-dropdown.show { display:block; }
.swap-option { padding:8px 12px; cursor:pointer; font-size:0.85rem; transition:var(--transition); }
.swap-option:hover { background:var(--accent-soft); }

/* MEAL BREAKDOWN */
.meal-day { border:1px solid var(--bg3); border-radius:var(--radius-sm); padding:14px; margin-bottom:10px; }
.meal-day-title { font-weight:600; font-size:0.95rem; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.meal-detail { font-size:0.85rem; color:var(--text2); margin-bottom:4px; padding-left:12px; }
.meal-your-portion { font-size:0.8rem; color:var(--accent); font-weight:500; padding-left:12px; margin-top:4px; }

/* ANIMATIONS */
@keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.fade-in { animation:fadeIn 0.3s ease; }

/* QUICK START */
.quick-start-card { background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); color:white; text-align:center; padding:30px; border-radius:var(--radius); margin-bottom:20px; cursor:pointer; transition:var(--transition); }
.quick-start-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.quick-start-card h2 { font-family:var(--font-display); font-size:1.5rem; margin-bottom:8px; }
.quick-start-card p { opacity:0.9; font-size:0.9rem; }

/* TRAINING DROPDOWN */
.training-select { padding:4px 6px; border:1px solid var(--bg3); border-radius:4px; font-size:0.7rem; width:100%; margin-top:4px; background:white; }

/* RESPONSIVE */
@media (max-width:600px) {
  .calendar-grid { grid-template-columns:repeat(7, 1fr); gap:4px; }
  .cal-day { padding:6px 4px; }
  .cal-day-name { font-size:0.6rem; }
  .cal-input { padding:4px; font-size:0.8rem; }
  .ingredient-grid { grid-template-columns:1fr 1fr; }
  .form-row { grid-template-columns:1fr; }
  .wheel-wrapper { width:260px; height:260px; }
  .wheel-canvas { width:260px; height:260px; }
  .phase-actions { flex-direction:column; }
  .main-content { padding:12px; }
}
/* Editable list in modals */
.edit-list-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--bg2); }
.edit-list-item input { flex:1; }
.edit-list-item .btn-sm { flex-shrink:0; }
.disclaimer { font-size:0.7rem; color:var(--text3); text-align:center; padding:20px; margin-top:20px; border-top:1px solid var(--bg3); }
.section-divider { height:1px; background:var(--bg3); margin:16px 0; }
.empty-state { text-align:center; padding:40px; color:var(--text3); }
.workout-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.7rem; font-weight:600; margin-left:4px; }
.workout-tag.pre { background:#E3F2FD; color:#1565C0; }
.workout-tag.post { background:#FFF3E0; color:#E65100; }
.workout-tag.rest { background:var(--bg2); color:var(--text3); }
.copy-toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--text); color:white; padding:12px 24px; border-radius:16px; font-size:0.85rem; z-index:300; display:none; max-width:90vw; text-align:center; line-height:1.4; box-shadow:var(--shadow-lg); }
.copy-toast strong { color:var(--accent-soft); }
.copy-toast.show { display:block; animation:fadeInUp 0.3s ease; }
</style>
</head>

<header class="app-header">
  <div class="app-logo" onclick="goHome()" style="cursor:pointer;">Prep<span>Week</span></div>
  <div class="header-actions">
    <button class="header-btn" onclick="showBodyStatsModal()" id="bmrBtn">🏋️ <span id="bmrStatus"></span></button>

</header>

<nav class="phase-nav" id="phaseNav">

<main class="main-content" id="mainContent"></main>

<div class="modal-overlay" id="modalOverlay">

</div>

function getSauceCuisine(sauceName) {
  for(const [cuisine, sauces] of Object.entries(CUISINE_FAMILIES)) {
    if(sauces.includes(sauceName)) return cuisine;
  }
  return 'other';
}

// Calculate weekly nutrient totals from chosen foods using actual calendar meal counts
// Target scaling: 14 possible lunch+dinner slots per week (7 lunches + 7 dinners).
// If you're cooking 5 of those, your food needs to cover 5/14 of the weekly nutrient target.
// Supplements (fish oil, psyllium) contribute daily regardless of meals.
function calcWeeklyNutrients(chosen) {
  // Count how many meals the user is actually cooking
  const trackedMeals = state.calendar.reduce((acc, d) => {
    if(d.lunch > 0) acc += 1;
    if(d.dinner > 0) acc += 1;
    return acc;
  }, 0);
  
  if(trackedMeals === 0) return { weekly:{}, daily:{}, trackedMeals:0, maxMeals:14, mealFraction:0 };
  
  const maxMeals = 14; // 7 lunches + 7 dinners
  const mealFraction = trackedMeals / maxMeals;
  
  // Split items across tracked meals
  const numProteins = chosen.proteins.filter(Boolean).length || 1;
  const numCarbs = chosen.carbs.filter(Boolean).length || 1;
  const numVegs = chosen.vegetables.filter(Boolean).length || 1;
  
  const mealsPerProtein = trackedMeals / numProteins;
  const mealsPerCarb = trackedMeals / numCarbs;
  const mealsPerVeg = trackedMeals / numVegs;
  
  // Portion sizes per meal (grams)
  const proteinGramsPerMeal = 150;
  const carbGramsPerMeal = 150;
  const vegGramsPerMeal = 85;
  
  const totals = {};
  Object.keys(DAILY_TARGETS).forEach(k => totals[k] = 0);
  
  chosen.proteins.filter(Boolean).forEach(p => {
    const profile = NUTRIENT_DB[p.name];
    if(!profile || !profile.micros) return;
    const mult = (mealsPerProtein * proteinGramsPerMeal) / 100;
    Object.keys(profile.micros).forEach(k => { if(totals[k] !== undefined) totals[k] += profile.micros[k] * mult; });
  });
  
  chosen.carbs.filter(Boolean).forEach(c => {
    const profile = NUTRIENT_DB[c.name];
    if(!profile || !profile.micros) return;
    const mult = (mealsPerCarb * carbGramsPerMeal) / 100;
    Object.keys(profile.micros).forEach(k => { if(totals[k] !== undefined) totals[k] += profile.micros[k] * mult; });
  });
  
  chosen.vegetables.filter(Boolean).forEach(v => {
    const profile = NUTRIENT_DB[v];
    if(!profile || !profile.micros) return;
    const mult = (mealsPerVeg * vegGramsPerMeal) / 100;
    Object.keys(profile.micros).forEach(k => { if(totals[k] !== undefined) totals[k] += profile.micros[k] * mult; });
  });
  
  // Add daily supplement contributions (full week, not scaled by meals)
  totals.omega3 += 7000; // fish oil ~1000mg/day
  totals.fiber += 70;    // psyllium husk ~5g × 2/day
  
  // Daily averages from food + supplements
  const daily = {};
  Object.keys(totals).forEach(k => daily[k] = totals[k] / 7);
  
  return { weekly: totals, daily, trackedMeals, maxMeals, mealFraction };
}

function getQuantitativeGaps(chosen) {
  const result = calcWeeklyNutrients(chosen);
  const { daily, trackedMeals, maxMeals, mealFraction } = result;
  const gaps = [];
  
  if(trackedMeals === 0) return { daily, gaps, trackedMeals, mealFraction };
  
  Object.keys(DAILY_TARGETS).forEach(key => {
    const target = DAILY_TARGETS[key];
    
    // What should these tracked meals provide?
    // Supplements contribute to the full daily target regardless of meals,
    // so subtract their daily contribution before scaling by meal fraction
    let suppDaily = 0;
    if(key === 'omega3') suppDaily = 1000;
    if(key === 'fiber') suppDaily = 10;
    
    // Food-only target for tracked meals = (full target - supplement) × meal fraction
    const foodTarget = Math.max(target.amount - suppDaily, 0) * mealFraction;
    // Total target for comparison = food target + supplement contribution
    const adjustedTarget = foodTarget + suppDaily;
    
    const actual = daily[key] || 0;
    const pct = Math.round((actual / adjustedTarget) * 100);
    const shortfall = adjustedTarget - actual;
    
    if(pct < 60) {
      gaps.push({ key, label:target.label, unit:target.unit, target:Math.round(adjustedTarget*10)/10, actual:Math.round(actual*10)/10, pct, shortfall:Math.round(Math.max(shortfall,0)*10)/10, severity:'critical', mealsNote:`across ${trackedMeals} of ${maxMeals} meals` });
    } else if(pct < 85) {
      gaps.push({ key, label:target.label, unit:target.unit, target:Math.round(adjustedTarget*10)/10, actual:Math.round(actual*10)/10, pct, shortfall:Math.round(Math.max(shortfall,0)*10)/10, severity:'low', mealsNote:`across ${trackedMeals} of ${maxMeals} meals` });
    }
  });
  
  gaps.sort((a,b) => a.pct - b.pct);
  return { daily, gaps, trackedMeals, mealFraction };
}

// ============================================================
// INDEXEDDB
// ============================================================
// ── IndexedDB with transparent in-memory fallback ──────────────────────────
// iOS Safari blocks IDB in private mode and when a file is opened locally.
// Rather than crashing with a blank screen, we fall back to a plain JS Map.
let _idbFailed = false;
const _memStore = {}; // store name → Map<key, value>
let _memHistorySeq = 1;

function _memGet(store) {
  if(!_memStore[store]) _memStore[store] = new Map();
  return _memStore[store];
}

function openDB() {
  return new Promise((resolve) => {
    // Quick guard: if IDB already failed this session just resolve immediately
    if(_idbFailed) { resolve(null); return; }
    // Some environments have indexedDB defined but broken — wrap in try
    let req;
    try { req = indexedDB.open('MealPrepSystem', 2); } catch(e) {
      console.warn('IDB open threw — using memory fallback', e);
      _idbFailed = true; resolve(null); return;
    }
    // Timeout: if IDB hangs for >3s (common in iOS private mode), fall back
    const timeout = setTimeout(() => {
      console.warn('IDB open timed out — using memory fallback');
      _idbFailed = true; resolve(null);
    }, 3000);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('rotation')) d.createObjectStore('rotation',{keyPath:'idx'});
      if(!d.objectStoreNames.contains('sauces')) d.createObjectStore('sauces',{keyPath:'idx'});
      if(!d.objectStoreNames.contains('methods')) d.createObjectStore('methods',{keyPath:'idx'});
      if(!d.objectStoreNames.contains('snacks')) d.createObjectStore('snacks',{keyPath:'idx'});
      if(!d.objectStoreNames.contains('rubs')) d.createObjectStore('rubs',{keyPath:'idx'});
      if(!d.objectStoreNames.contains('history')) {
        const hs = d.createObjectStore('history',{keyPath:'id',autoIncrement:true});
        hs.createIndex('date','date');
        hs.createIndex('rotationWeek','rotationWeek');
      }
    };
    req.onsuccess = (e) => {
      clearTimeout(timeout);
      db = e.target.result;
      resolve(db);
    };
    req.onerror = (e) => {
      clearTimeout(timeout);
      console.warn('IDB onerror — using memory fallback', e);
      _idbFailed = true; resolve(null);
    };
    req.onblocked = () => {
      clearTimeout(timeout);
      console.warn('IDB blocked — using memory fallback');
      _idbFailed = true; resolve(null);
    };
  });
}

function dbAdd(store, data) {
  if(_idbFailed || !db) {
    const m = _memGet(store);
    const newId = _memHistorySeq++;
    const record = { ...data, id: newId };
    m.set(newId, record);
    return Promise.resolve(newId);
  }
  return new Promise((resolve, reject) => {
    try {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).add(data);
      req.onsuccess = () => resolve(req.result);
      tx.onerror = reject;
    } catch(e) { _idbFailed = true; resolve(dbAdd(store, data)); }
  });
}

function dbPut(store, data) {
  if(_idbFailed || !db) {
    const m = _memGet(store);
    const key = data.id !== undefined ? data.id : data.idx;
    m.set(key, data);
    return Promise.resolve();
  }
  return new Promise((resolve,reject) => {
    try {
      const tx = db.transaction(store,'readwrite');
      const s = tx.objectStore(store);
      s.put(data);
      tx.oncomplete = resolve;
      tx.onerror = reject;
    } catch(e) { _idbFailed = true; dbPut(store, data).then(resolve).catch(reject); }
  });
}

function dbGetAll(store) {
  if(_idbFailed || !db) {
    return Promise.resolve(Array.from(_memGet(store).values()));
  }
  return new Promise((resolve,reject) => {
    try {
      const tx = db.transaction(store,'readonly');
      const s = tx.objectStore(store);
      const req = s.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = reject;
    } catch(e) { _idbFailed = true; resolve(Array.from(_memGet(store).values())); }
  });
}

function dbClear(store) {
  if(_idbFailed || !db) {
    _memGet(store).clear();
    return Promise.resolve();
  }
  return new Promise((resolve,reject) => {
    try {
      const tx = db.transaction(store,'readwrite');
      tx.objectStore(store).clear();
      tx.oncomplete = resolve;
      tx.onerror = reject;
    } catch(e) { _idbFailed = true; _memGet(store).clear(); resolve(); }
  });
}

function dbDelete(store, key) {
  if(_idbFailed || !db) {
    _memGet(store).delete(key);
    return Promise.resolve();
  }
  return new Promise((resolve,reject) => {
    try {
      const tx = db.transaction(store,'readwrite');
      tx.objectStore(store).delete(key);
      tx.oncomplete = resolve;
      tx.onerror = reject;
    } catch(e) { _idbFailed = true; _memGet(store).delete(key); resolve(); }
  });
}

async function seedDefaults() {
  const rot = await dbGetAll('rotation');
  if(rot.length === 0) {
    for(let i=0;i<DEFAULT_ROTATION.length;i++) await dbPut('rotation',{idx:i,...DEFAULT_ROTATION[i]});
  }
  const meth = await dbGetAll('methods');
  // Re-seed if empty OR if any method lacks a 'type' field (legacy data from before batch/finishing split)
  const methodsNeedReseed = meth.length === 0 || meth.some(m => !m.type) || meth.length < DEFAULT_METHODS.length;
  if(methodsNeedReseed) {
    await dbClear('methods');
    for(let i=0;i<DEFAULT_METHODS.length;i++) await dbPut('methods',{idx:i,...DEFAULT_METHODS[i]});
  }
  const sauces = await dbGetAll('sauces');
  if(sauces.length === 0) {
    for(let i=0;i<DEFAULT_SAUCES.length;i++) await dbPut('sauces',{idx:i,...DEFAULT_SAUCES[i]});
  }
  const rubs = await dbGetAll('rubs');
  if(rubs.length === 0) {
    for(let i=0;i<DEFAULT_RUBS.length;i++) await dbPut('rubs',{idx:i,...DEFAULT_RUBS[i]});
  }
  const snacks = await dbGetAll('snacks');
  if(snacks.length === 0) {
    for(let i=0;i<DEFAULT_SNACKS.length;i++) await dbPut('snacks',{idx:i,...DEFAULT_SNACKS[i]});
  }
}

async function loadFromDB() {
  state.rotation = await dbGetAll('rotation');
  state.rotation.sort((a,b)=>a.idx-b.idx);
  state.methods = await dbGetAll('methods');
  state.methods.sort((a,b)=>a.idx-b.idx);
  state.sauces = await dbGetAll('sauces');
  state.sauces.sort((a,b)=>a.idx-b.idx);

  state.rubs.sort((a,b)=>a.idx-b.idx);
  state.snacks = await dbGetAll('snacks');
  state.snacks.sort((a,b)=>a.idx-b.idx);

  state.history.sort((a,b)=> new Date(b.date) - new Date(a.date));
}

    const ct = JSON.parse(localStorage.getItem('mps_calendarTemplate')||'null');
    if(ct) state.calendarTemplate = ct;
    const cw = localStorage.getItem('mps_completedWeeks');
    if(cw) state.completedWeeks = parseInt(cw);
    // Restore active week state
    state.weekSetupComplete = localStorage.getItem('mps_weekSetupComplete') === '1';
    state.weekSetupDate = localStorage.getItem('mps_weekSetupDate') || null;
    const aw = JSON.parse(localStorage.getItem('mps_activeWeek')||'null');
    if(aw) {
      if(aw.weekIngredients) state.weekIngredients = aw.weekIngredients;
      if(aw.calendar) state.calendar = aw.calendar;
      if(aw.batchMethods) state.batchMethods = aw.batchMethods;
      if(aw.selectedSauces) state.selectedSauces = aw.selectedSauces;
      if(aw.selectedRubs) state.selectedRubs = aw.selectedRubs;
      state.selectedSnack = aw.selectedSnack || null;
      if(aw.dinnerMethods) state.dinnerMethods = aw.dinnerMethods;
      if(aw.leftovers) state.leftovers = aw.leftovers;
    }
  } catch(e) { console.error('LS load error',e); }
  // Safety: ensure per-protein arrays are correctly shaped even if older state leaks in
  if(!Array.isArray(state.batchMethods)) state.batchMethods = [null, null];
  while(state.batchMethods.length < 2) state.batchMethods.push(null);
  if(!Array.isArray(state.selectedSauces)) state.selectedSauces = [null, null];
  while(state.selectedSauces.length < 2) state.selectedSauces.push(null);
  if(!Array.isArray(state.selectedRubs)) state.selectedRubs = [null, null];
  while(state.selectedRubs.length < 2) state.selectedRubs.push(null);
}

function saveLS() {
  localStorage.setItem('mps_defaults', JSON.stringify(state.defaults));
  localStorage.setItem('mps_currentWeekIndex', state.currentWeekIdx);
  localStorage.setItem('mps_pantryChecklist', JSON.stringify(state.pantryChecklist));
  localStorage.setItem('mps_athleteEssentials', JSON.stringify(state.athleteEssentials));
  localStorage.setItem('mps_athleteChecklist', JSON.stringify(state.athleteChecklist));
  localStorage.setItem('mps_completedWeeks', state.completedWeeks);
  if(state.calendarTemplate) localStorage.setItem('mps_calendarTemplate', JSON.stringify(state.calendarTemplate));
  // Persist active week so it survives app close/reopen
  localStorage.setItem('mps_weekSetupComplete', state.weekSetupComplete ? '1' : '0');
  localStorage.setItem('mps_weekSetupDate', state.weekSetupDate || '');
  localStorage.setItem('mps_activeWeek', JSON.stringify({
    weekIngredients: state.weekIngredients,
    calendar: state.calendar,
    batchMethods: state.batchMethods,
    selectedSauces: state.selectedSauces,
    selectedRubs: state.selectedRubs,
    selectedSnack: state.selectedSnack,
    dinnerMethods: state.dinnerMethods,
    leftovers: state.leftovers
  }));
}

  const nav = document.getElementById('phaseNav');

async function init() {
  try {
    loadLS();
    await openDB();
    await seedDefaults();
    await loadFromDB();
  // set week ingredients from current rotation if not yet picked
  if(!state.weekSetupComplete && state.rotation.length > 0 && !state.weekIngredients.proteins.length) {
    const w = state.rotation[state.currentWeekIdx % state.rotation.length];
    state.weekIngredients = { proteins:[...w.proteins], carbs:[...w.carbs], vegetables:[...w.vegetables] };
  }
  // apply calendar template if not yet set up
  if(!state.weekSetupComplete && state.calendarTemplate) state.calendar = JSON.parse(JSON.stringify(state.calendarTemplate));

  // If weekSetupComplete is true but no ingredients were restored (old save format),
  // auto-load from the most recent history entry so the dashboard isn't empty
  if(state.weekSetupComplete && !state.weekIngredients.proteins.length && state.history.length > 0) {
    const latest = state.history[0];
    state.weekIngredients = JSON.parse(JSON.stringify(latest.ingredients || { proteins:[], carbs:[], vegetables:[] }));
    state.calendar = JSON.parse(JSON.stringify(latest.calendar || state.calendar));
    state.batchMethods = JSON.parse(JSON.stringify(Array.isArray(latest.batchMethods) ? latest.batchMethods : [latest.batchMethod||null, null]));
    state.selectedSauces = JSON.parse(JSON.stringify(latest.sauces || [null, null]));
    state.selectedRubs = JSON.parse(JSON.stringify(latest.rubs || [null, null]));
    state.selectedSnack = latest.snack ? JSON.parse(JSON.stringify(latest.snack)) : null;
    state.dinnerMethods = JSON.parse(JSON.stringify(latest.dinnerMethods || {}));
    state.weekSetupDate = latest.date;
    saveLS(); // write it into localStorage so next load is instant
  }
  
  // Sunday rollover: if today is Sunday and a setup exists from a prior day, archive and reset
  if(state.weekSetupComplete && state.weekSetupDate) {
    const setupDate = new Date(state.weekSetupDate);
    const today = new Date();
    const isSunday = today.getDay() === 0;
    const setupWasBeforeToday = setupDate.toDateString() !== today.toDateString();
    if(isSunday && setupWasBeforeToday) {
      // Archive and reset for new week
      state.weekSetupComplete = false;
      state.weekSetupDate = null;
      state.currentWeekIdx = (state.currentWeekIdx + 1) % Math.max(state.rotation.length,1);
      state.batchMethods = [null, null];
      state.selectedSauces = [null, null];
      state.selectedRubs = [null, null];
      state.selectedSnack = null;
      state.dinnerMethods = {};
      state.leftovers = {};
      saveLS();
    }
  }
  
  // Route to the right view
  if(state.weekSetupComplete) {
    renderDashboard();
  } else {
    renderPhase(1);
  }
  updateBmrStatus();
  } catch(err) {
    console.error('PrepWeek init error:', err);
    // Ensure the page is never blank — fall back to phase 1 with defaults loaded
    try {
      if(!state.rotation.length) {
        state.rotation = DEFAULT_ROTATION.map((r,i) => ({idx:i,...r}));
        state.methods = DEFAULT_METHODS.map((m,i) => ({idx:i,...m}));
        state.sauces = DEFAULT_SAUCES.map((s,i) => ({idx:i,...s}));
        state.rubs = DEFAULT_RUBS.map((r,i) => ({idx:i,...r}));
        state.snacks = DEFAULT_SNACKS.map((s,i) => ({idx:i,...s}));
        const w = state.rotation[0];
        state.weekIngredients = { proteins:[...w.proteins], carbs:[...w.carbs], vegetables:[...w.vegetables] };
      }
      renderPhase(1);
      updateBmrStatus();
    } catch(e2) {
      document.getElementById('mainContent').innerHTML =
        '<div style="padding:40px;text-align:center;color:#C44A4A;">⚠️ Failed to load. Try refreshing, or open in Safari (not private mode).<br><br><small>' + (err && err.message || err) + '</small></div>';
    }
  }
}

function goToPhase(n) {
  state.currentPhase = n;
  // Restore phase nav (it may be hidden if we were in dashboard mode)
  const nav = document.getElementById('phaseNav');
  if(nav) nav.style.display = '';
  document.querySelectorAll('.phase-tab').forEach(t => {
    const p = parseInt(t.dataset.phase);
    t.classList.toggle('active', p===n);
    t.classList.toggle('completed', p<n);
  });
  renderPhase(n);
}

function renderPhase(n) {
  const mc = document.getElementById('mainContent');
  switch(n) {
    case 1: mc.innerHTML = renderPhaseCalendar(); break;
    case 2: mc.innerHTML = renderPhaseIngredients(); break;
    case 3: mc.innerHTML = renderPhase3(); break;
    case 4: mc.innerHTML = renderPhase4(); break;
  }
}

function renderPhaseIngredients() {
  if(state.customWeekMode) return renderCustomWeekBuilder();
  
  const w = state.rotation[state.currentWeekIdx % state.rotation.length];
  if(!w) return '<div class="empty-state">No rotation data. Check settings.</div>';
  
  // History-based warnings (always show)
  const warnings = getHealthWarnings();
  let warnHtml = warnings.map(w => `<div class="warning ${w.level==='red'?'warning-red':'warning-yellow'}">${w.icon} ${w.msg}</div>`).join('');

  // Health recs toggle + quantitative analysis
  const hasBMR = calcTDEE() !== null;
  const healthOn = state.healthRecsMode && hasBMR;
  
  let healthToggle;
  if(hasBMR) {
    healthToggle = healthOn
      ? `<button class="btn btn-secondary" style="background:var(--green);color:white;border:none;font-size:0.85rem;padding:8px 14px;" onclick="toggleHealthRecs()">🩺 Health Recommendations: ON</button>`
      : `<button class="btn btn-outline" style="border-color:var(--green);color:var(--green);font-size:0.85rem;padding:8px 14px;" onclick="toggleHealthRecs()">🩺 Turn on Health Recommendations</button>`;
  } else {
    healthToggle = `<button class="btn btn-outline" style="opacity:0.5;cursor:not-allowed;font-size:0.85rem;padding:8px 14px;" onclick="showHealthRecsRequirements()">🩺 Health Recs (set BMR first)</button>`;
  }

  // Nutrient analysis for preset week
  let nutrientPanel = '';
  if(healthOn) {
    const weekData = {
      proteins: state.weekIngredients.proteins,
      carbs: state.weekIngredients.carbs,
      vegetables: state.weekIngredients.vegetables.map(v => typeof v === 'string' ? v : v)
    };
    const { daily, gaps, trackedMeals: totalTrackedMeals } = getQuantitativeGaps(weekData);
    const criticalGaps = gaps.filter(g => g.severity === 'critical');
    const lowGaps = gaps.filter(g => g.severity === 'low');
    const tdee = calcTDEE();
    
    // Coverage pills
    const analysis = analyzeNutrientGaps(weekData);
    const coverageHtml = NUTRIENT_GOALS.map(g => {
      const covered = analysis.coveredTags.has(g.key);
      const qGap = gaps.find(gp => gp.key === g.key);
      const pct = qGap ? qGap.pct : (covered ? 100 : null);
      const pctLabel = pct !== null ? ` ${pct}%` : '';
      const color = pct !== null ? (pct >= 85 ? 'background:var(--green-soft);color:var(--green);' : pct >= 60 ? 'background:var(--yellow-soft);color:var(--yellow);' : 'background:var(--red-soft);color:var(--red);') : (covered ? 'background:var(--green-soft);color:var(--green);' : 'background:var(--bg2);color:var(--text3);');
      return `<span style="display:inline-block;padding:3px 8px;border-radius:10px;font-size:0.7rem;margin:2px;${color}">${g.icon} ${g.label}${pctLabel}</span>`;
    }).join('');

    // Color dots
    const colorHtml = VEG_COLOR_GOALS.map(c => {
      const covered = analysis.coveredColors.has(c);
      const colorMap = {green:'#4A8B5C',red:'#C44A4A',orange:'#D4803A',white:'#9B9590',purple:'#7B5EA7',yellow:'#C4960C'};
      return `<span style="display:inline-block;width:20px;height:20px;border-radius:50%;margin:2px;border:2px solid ${covered?colorMap[c]:'var(--bg3)'};background:${covered?colorMap[c]:'var(--bg)'};opacity:${covered?1:0.3};" title="${c}"></span>`;
    }).join('');

    // Gap warnings with action buttons
    let gapWarnings = '';
    if(criticalGaps.length > 0 || lowGaps.length > 0) {
      const allGaps = [...criticalGaps, ...lowGaps.slice(0,3)];
      gapWarnings = allGaps.map(g => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin-bottom:4px;border-radius:var(--radius-sm);background:${g.severity==='critical'?'var(--red-soft)':'var(--yellow-soft)'};">
          <span style="font-size:0.8rem;font-weight:500;">${g.label}: ${g.pct}% <span style="color:var(--text3);">(${g.actual}/${g.target} ${g.unit})</span></span>
          <div style="display:flex;gap:4px;">
            <button class="btn-sm" style="font-size:0.7rem;background:var(--blue-soft);color:var(--blue);" onclick="showPresetSmartSwap('${g.key}')">↻ Swap</button>
            <button class="btn-sm" style="font-size:0.7rem;background:var(--green-soft);color:var(--green);" onclick="showSupplementProtocol('${g.key}')">💊 Fix</button>
          </div>
        </div>
      `).join('');
    }

    nutrientPanel = `
      <div class="card">
        <div class="card-title">📊 Nutrient Analysis</div>
        <div class="card-subtitle">Targets scaled to ${totalTrackedMeals} tracked meals out of 14 possible lunch+dinner slots</div>
        <div style="margin-bottom:8px;">${coverageHtml}</div>
        <div style="margin-bottom:8px;">
          <span style="font-size:0.75rem;font-weight:600;color:var(--text2);margin-right:6px;">Veg colors:</span>${colorHtml}
        </div>
        ${gapWarnings ? `<div class="section-divider"></div>${gapWarnings}` : '<div style="font-size:0.85rem;color:var(--green);margin-top:8px;">✓ This week covers your nutrient targets well.</div>'}
      </div>`;
  }

  return `
    <div class="quick-start-card" onclick="quickStart()">
      <h2>⚡ Generate My Week</h2>
      <p>Auto-spin everything and jump to your grocery list</p>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-secondary" style="flex:1;border:2px solid var(--accent);color:var(--accent);" onclick="enterCustomWeekMode()">🧪 Build a Custom Week</button>
      ${healthToggle}
    </div>
    ${nutrientPanel}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="card-title">${w.name || 'Week '+(state.currentWeekIdx+1)}</div>
        <select class="form-select" style="width:auto;padding:6px 10px;font-size:0.85rem;" onchange="switchWeek(this.value)">
          ${state.rotation.map((r,i) => `<option value="${i}" ${i===state.currentWeekIdx%state.rotation.length?'selected':''}>${r.letter||r.name||'Week '+(i+1)}</option>`).join('')}
        </select>
      </div>
      <div class="card-subtitle">Select your ingredients for this week. Swap anything you'd like.</div>
      ${warnHtml}
      
      <h4 style="margin:16px 0 8px;color:var(--accent);">🥩 Proteins</h4>
      <div class="ingredient-grid">
        ${state.weekIngredients.proteins.map((p,i) => ingredientCard(p,'protein',i)).join('')}
      </div>
      
      <h4 style="margin:16px 0 8px;color:var(--yellow);">🌾 Carbs</h4>
      <div class="ingredient-grid">
        ${state.weekIngredients.carbs.map((c,i) => ingredientCard(c,'carb',i)).join('')}
      </div>
      
      <h4 style="margin:16px 0 8px;color:var(--green);">🥬 Vegetables</h4>
      <div class="ingredient-grid">
        ${state.weekIngredients.vegetables.map((v,i) => ingredientCard({name:v},'veg',i)).join('')}
      </div>
    </div>
    
    <div class="phase-actions">
      <button class="btn btn-secondary" onclick="goToPhase(1)">← Calendar</button>
      <button class="btn btn-primary" onclick="proceedFromIngredients()">Next: Randomizer →</button>
    </div>
    <div class="disclaimer">This tool is not a replacement for professional dietitian advice. Consult a professional for personalized nutrition guidance.</div>
  `;
}

function proceedFromIngredients() {
  // If health mode on, run quantitative intercept check
  if(state.healthRecsMode && calcTDEE()) {
    const weekData = {
      proteins: state.weekIngredients.proteins,
      carbs: state.weekIngredients.carbs,
      vegetables: state.weekIngredients.vegetables
    };
    const { daily, gaps, trackedMeals } = getQuantitativeGaps(weekData);
    const criticalGaps = gaps.filter(g => g.severity === 'critical');
    const lowGaps = gaps.filter(g => g.severity === 'low');
    
    if(criticalGaps.length > 0) {
      showNutrientInterceptModal(daily, gaps, criticalGaps, lowGaps, function() { goToPhase(3); }, trackedMeals);
      return;
    }
  }
  goToPhase(3);
}

function showPresetSmartSwap(gapKey) {
  // Run smart swaps against weekIngredients (not customWeek)
  // Temporarily copy weekIngredients into customWeek format for reuse
  const backup = JSON.parse(JSON.stringify(state.customWeek));
  state.customWeek = {
    proteins: [...state.weekIngredients.proteins],
    carbs: [...state.weekIngredients.carbs],
    vegetables: [...state.weekIngredients.vegetables]
  };
  showSmartSwaps(gapKey);
  // Override executeSmartSwap to also update weekIngredients
  const origExecute = window._origExecuteSmartSwap || executeSmartSwap;
  window._origExecuteSmartSwap = origExecute;
  window.executeSmartSwap = function(slot, idx, newItem) {
    state.customWeek[slot][idx] = newItem;
    // Also apply to weekIngredients
    state.weekIngredients[slot === 'proteins' ? 'proteins' : slot === 'carbs' ? 'carbs' : 'vegetables'][idx] = newItem;
    closeModal();
    state.customWeek = backup;
    window.executeSmartSwap = origExecute;
    renderPhase(2);
  };
}

function enterCustomWeekMode() {

  renderPhase(2);

function exitCustomWeekMode() {

function analyzeNutrientGaps(chosen) {
  // Collect all nutrient tags from chosen items
  const coveredTags = new Set();
  const coveredFoodGroups = new Set();
  const coveredColors = new Set();
  
  const allItems = [
    ...chosen.proteins.filter(Boolean).map(p => p.name),
    ...chosen.carbs.filter(Boolean).map(c => c.name),
    ...chosen.vegetables.filter(Boolean)
  ];
  
  allItems.forEach(name => {
    const profile = NUTRIENT_DB[name];
    if(!profile) return;
    (profile.tags || []).forEach(t => coveredTags.add(t));
    if(profile.foodGroup) coveredFoodGroups.add(profile.foodGroup);
    if(profile.vegColor && profile.vegColor !== 'mixed') coveredColors.add(profile.vegColor);
  });
  
  // Find missing nutrients
  const gaps = NUTRIENT_GOALS.filter(g => !coveredTags.has(g.key));
  const highGaps = gaps.filter(g => g.priority === 'high');
  const medGaps = gaps.filter(g => g.priority === 'medium');
  
  // Color diversity
  const missingColors = VEG_COLOR_GOALS.filter(c => !coveredColors.has(c));
  
  // Food group diversity
  const hasPoultry = coveredFoodGroups.has('poultry');
  const hasFish = coveredFoodGroups.has('fish-fatty') || coveredFoodGroups.has('fish-lean');
  const hasPlantProtein = coveredFoodGroups.has('plant-protein') || coveredFoodGroups.has('legume');
  const hasWholeGrain = coveredFoodGroups.has('whole-grain');
  const hasCruciferous = coveredFoodGroups.has('cruciferous');
  const hasLeafyGreen = coveredFoodGroups.has('leafy-green');
  
  return { coveredTags, coveredFoodGroups, coveredColors, gaps, highGaps, medGaps, missingColors, hasPoultry, hasFish, hasPlantProtein, hasWholeGrain, hasCruciferous, hasLeafyGreen };
}

function getRecommendations(chosen, slotType) {
  const analysis = analyzeNutrientGaps(chosen);
  const chosenNames = [
    ...chosen.proteins.filter(Boolean).map(p=>p.name),
    ...chosen.carbs.filter(Boolean).map(c=>c.name),
    ...chosen.vegetables.filter(Boolean)
  ];
  
  let pool;
  if(slotType === 'protein') pool = ALL_PROTEINS.filter(p => !chosenNames.includes(p.name));
  else if(slotType === 'carb') pool = ALL_CARBS.filter(c => !chosenNames.includes(c.name));
  else pool = ALL_VEGETABLES.filter(v => !chosenNames.includes(v));
  
  // Score each candidate
  const scored = pool.map(item => {
    const name = typeof item === 'string' ? item : item.name;
    const profile = NUTRIENT_DB[name] || { tags:[], foodGroup:null, vegColor:null };
    let score = 0;
    let reasons = [];
    
    // Nutrient gap filling
    const gapKeys = analysis.gaps.map(g => g.key);
    const fills = (profile.tags||[]).filter(t => gapKeys.includes(t));
    score += fills.length * 3;
    const highFills = fills.filter(t => analysis.highGaps.some(g => g.key === t));
    score += highFills.length * 2; // bonus for high-priority
    if(fills.length > 0) reasons.push('Fills: ' + fills.join(', '));
    
    // Color diversity
    if(slotType === 'veg' && profile.vegColor && analysis.missingColors.includes(profile.vegColor)) {
      score += 2;
      reasons.push(profile.vegColor + ' color');
    }
    
    // Food group diversity
    if(profile.foodGroup && !analysis.coveredFoodGroups.has(profile.foodGroup)) {
      score += 2;
      reasons.push('New food group: ' + profile.foodGroup);
    }
    
    // Specific bonuses
    if(!analysis.hasFish && profile.foodGroup === 'fish-fatty') { score += 3; reasons.push('Adds omega-3 source'); }
    if(!analysis.hasLeafyGreen && profile.foodGroup === 'leafy-green') { score += 2; reasons.push('Adds leafy greens'); }
    if(!analysis.hasCruciferous && profile.foodGroup === 'cruciferous') { score += 2; reasons.push('Adds cruciferous veg'); }
    if(!analysis.hasWholeGrain && profile.foodGroup === 'whole-grain') { score += 2; reasons.push('Adds whole grain'); }
    if(!analysis.hasPlantProtein && (profile.foodGroup === 'legume' || profile.foodGroup === 'plant-protein')) { score += 2; reasons.push('Adds plant protein'); }
    
    return { item, name, score, reasons, profile };
  });
  
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, 5);
}

  else pool = ALL_VEGETABLES.filter(v => !chosenNames.includes(v));

  const recs = getRecommendations(state.customWeek, type);
  const recNames = recs.map(r => r.name);

  let html = `
    <div class="modal-header">

function setCustomSlot(type, idx, value) {
  if(type === 'protein') state.customWeek.proteins[idx] = value;
  else if(type === 'carb') state.customWeek.carbs[idx] = value;
  else state.customWeek.vegetables[idx] = value;
  renderPhase(2);
}

function pickCustomItem(type, item) {
  // Find first empty slot of this type
  if(type === 'protein') {
    const idx = state.customWeek.proteins.findIndex(p => !p);
    if(idx >= 0) state.customWeek.proteins[idx] = item;
  } else if(type === 'carb') {
    const idx = state.customWeek.carbs.findIndex(c => !c);
    if(idx >= 0) state.customWeek.carbs[idx] = item;
  } else {
    const idx = state.customWeek.vegetables.findIndex(v => !v);
    if(idx >= 0) state.customWeek.vegetables[idx] = item;
  }
  renderPhase(2);
}

function clearCustomSlot(category, idx) {
  state.customWeek[category][idx] = null;
  renderPhase(2);
}

function autoFillCustomWeek() {
  const cw = state.customWeek;
  
  // Fill proteins first (they have the biggest nutrient impact)
  for(let i = 0; i < cw.proteins.length; i++) {
    if(!cw.proteins[i]) {
      const recs = getRecommendations(cw, 'protein');
      if(recs.length > 0) cw.proteins[i] = recs[0].item;
    }
  }
  
  // Fill carbs next
  for(let i = 0; i < cw.carbs.length; i++) {
    if(!cw.carbs[i]) {
      const recs = getRecommendations(cw, 'carb');
      if(recs.length > 0) cw.carbs[i] = recs[0].item;
    }
  }
  
  // Fill vegetables last (most slots, most color/diversity impact)
  for(let i = 0; i < cw.vegetables.length; i++) {
    if(!cw.vegetables[i]) {
      const recs = getRecommendations(cw, 'veg');
      if(recs.length > 0) cw.vegetables[i] = recs[0].name;
    }
  }
  
  renderPhase(2);
}

function autoFillCustomWeekRandom() {
  const cw = state.customWeek;
  const chosenNames = () => [
    ...cw.proteins.filter(Boolean).map(p=>p.name),
    ...cw.carbs.filter(Boolean).map(c=>c.name),
    ...cw.vegetables.filter(Boolean)

  for(let i = 0; i < cw.proteins.length; i++) {

  for(let i = 0; i < cw.carbs.length; i++) {
    if(!cw.carbs[i]) {

      if(pool.length > 0) cw.carbs[i] = pool[Math.floor(Math.random()*pool.length)];

  }
  for(let i = 0; i < cw.vegetables.length; i++) {
    if(!cw.vegetables[i]) {
      const pool = ALL_VEGETABLES.filter(v => !chosenNames().includes(v));
      if(pool.length > 0) cw.vegetables[i] = pool[Math.floor(Math.random()*pool.length)];

function applyCustomWeek() {
  const cw = state.customWeek;
  if(!cw.proteins.every(Boolean) || !cw.carbs.every(Boolean) || !cw.vegetables.every(Boolean)) return;
  
  // If health mode is on, run quantitative check
  if(state.healthRecsMode && calcTDEE()) {
    const { daily, gaps, trackedMeals } = getQuantitativeGaps(cw);
    const criticalGaps = gaps.filter(g => g.severity === 'critical');
    const lowGaps = gaps.filter(g => g.severity === 'low');
    
    if(criticalGaps.length > 0 || lowGaps.length > 0) {
      showNutrientInterceptModal(daily, gaps, criticalGaps, lowGaps, null, trackedMeals);
      return;
    }
  }
  
  // No issues or health mode off — proceed
  commitCustomWeek();
}

function commitCustomWeek() {
  const cw = state.customWeek;
  state.weekIngredients = {
    proteins: [...cw.proteins],
    carbs: [...cw.carbs],
    vegetables: [...cw.vegetables]
  };
  state.customWeekMode = false;
  state.leftovers = {};
  goToPhase(3);
}

function showNutrientInterceptModal(daily, gaps, criticalGaps, lowGaps, onProceed, trackedMeals) {
  const tdee = calcTDEE();
  const proceedFn = onProceed ? '_nutrientInterceptProceed()' : 'commitCustomWeek()';
  if(onProceed) window._nutrientInterceptProceed = function() { closeModal(); onProceed(); };
  
  // Build bar chart for each nutrient
  const mealFraction = trackedMeals ? trackedMeals / 14 : 1;
  const allNutrients = Object.keys(DAILY_TARGETS);
  const barsHtml = allNutrients.map(key => {
    const fullTarget = DAILY_TARGETS[key];
    // Calculate adjusted target same way as getQuantitativeGaps
    let suppDaily = 0;
    if(key === 'omega3') suppDaily = 1000;
    if(key === 'fiber') suppDaily = 10;
    const foodTarget = Math.max(fullTarget.amount - suppDaily, 0) * mealFraction;
    const adjustedTarget = Math.round((foodTarget + suppDaily)*10)/10;
    
    const actual = daily[key] || 0;
    const pct = Math.min(Math.round((actual / adjustedTarget) * 100), 150);
    const gap = gaps.find(g => g.key === key);
    const barColor = pct >= 85 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)';
    
    return `
      <div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:2px;">
          <span style="font-weight:${gap?'600':'400'};color:${gap?barColor:'var(--text2)'};">${fullTarget.label}</span>
          <span style="color:var(--text3);">${Math.round(actual*10)/10} / ${adjustedTarget} ${fullTarget.unit} <strong style="color:${barColor};">(${pct}%)</strong></span>
        </div>
        <div style="height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${Math.min(pct,100)}%;background:${barColor};border-radius:4px;transition:width 0.3s;"></div>
        </div>
      </div>`;
  }).join('');

  // Actionable recommendations for critical gaps
  const recsHtml = criticalGaps.map(g => `
    <div style="border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;">
      <div style="font-weight:600;color:var(--red);margin-bottom:4px;">
        ${g.label}: ${g.actual} ${g.unit} → need ${g.target} ${g.unit} <span style="font-size:0.75rem;background:var(--red-soft);padding:1px 6px;border-radius:4px;">${g.pct}%</span>
      </div>
      <div style="font-size:0.8rem;color:var(--text2);margin-bottom:8px;">Short by ~${g.shortfall} ${g.unit}/day from food alone</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-sm" style="background:var(--blue-soft);color:var(--blue);" onclick="closeModal();showSmartSwaps('${g.key}')">↻ Smart swap</button>
        <button class="btn-sm" style="background:var(--green-soft);color:var(--green);" onclick="closeModal();showSupplementProtocol('${g.key}')">💊 Supplement plan</button>
      </div>
    </div>
  `).join('');

  const lowRecsHtml = lowGaps.map(g => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:4px;background:var(--yellow-soft);border-radius:var(--radius-sm);">
      <span style="font-size:0.85rem;">${g.label}: ${g.pct}% (${g.actual}/${g.target} ${g.unit})</span>
      <button class="btn-sm" style="font-size:0.7rem;background:var(--bg);color:var(--text2);" onclick="closeModal();showSupplementProtocol('${g.key}')">Fix →</button>
    </div>
  `).join('');

  const html = `
    <div class="modal-header">
      <div class="modal-title">🩺 Nutrient Check — Weekly Assessment</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:0.85rem;color:var(--text2);margin-bottom:16px;">
        Based on ${trackedMeals || 'your'} tracked meals out of 14 possible lunch+dinner slots. Targets are proportional — your other meals and supplements cover the rest.
      </div>
      
      <div style="margin-bottom:20px;">
        ${barsHtml}
      </div>

      ${criticalGaps.length > 0 ? `
        <h4 style="color:var(--red);margin-bottom:8px;">🔴 Critical Shortfalls (below 60% of target)</h4>
        <div style="margin-bottom:16px;">${recsHtml}</div>
      ` : ''}

      ${lowGaps.length > 0 ? `
        <h4 style="color:var(--yellow);margin-bottom:8px;">🟡 Below Target (60-85%)</h4>
        <div style="margin-bottom:16px;">${lowRecsHtml}</div>
      ` : ''}
    </div>
    <div class="modal-footer" style="flex-wrap:wrap;gap:8px;">
      <button class="btn btn-secondary" onclick="closeModal()">← Go back and adjust</button>
      <button class="btn btn-primary" onclick="closeModal();${onProceed?'_nutrientInterceptProceed()':'commitCustomWeek()'}">Proceed anyway →</button>
    </div>
  `;
  showModal(html);
}

function showSmartSwaps(gapKey) {
  const cw = state.customWeek;
  const currentAnalysis = analyzeNutrientGaps(cw);
  const currentGapCount = currentAnalysis.gaps.length;
  const swapOptions = [];
  
  // Try swapping each filled slot with alternatives and score the result
  // Proteins
  cw.proteins.forEach((p, i) => {
    if(!p) return;
    ALL_PROTEINS.filter(alt => alt.name !== p.name && !cw.proteins.some(x=>x&&x.name===alt.name)).forEach(alt => {
      const altProfile = NUTRIENT_DB[alt.name] || {tags:[]};
      if(!altProfile.tags.includes(gapKey)) return; // candidate must actually fill the gap
      // Simulate the swap
      const simWeek = JSON.parse(JSON.stringify(cw));
      simWeek.proteins[i] = alt;
      const simAnalysis = analyzeNutrientGaps(simWeek);
      // Only suggest if it doesn't create MORE gaps than we currently have
      if(simAnalysis.gaps.length <= currentGapCount) {
        const newGaps = simAnalysis.gaps.filter(g => !currentAnalysis.gaps.some(cg=>cg.key===g.key));
        const fixedGaps = currentAnalysis.gaps.filter(g => !simAnalysis.gaps.some(sg=>sg.key===g.key));
        swapOptions.push({
          remove: p.name, removeSlot:'proteins', removeIdx:i,
          add: alt, addName: alt.name,
          fixedCount: fixedGaps.length, newGapCount: newGaps.length,
          fixedNames: fixedGaps.map(g=>g.label), newGapNames: newGaps.map(g=>g.label),
          netScore: fixedGaps.length - newGaps.length
        });
      }
    });
  });
  
  // Carbs
  cw.carbs.forEach((c, i) => {
    if(!c) return;
    ALL_CARBS.filter(alt => alt.name !== c.name && !cw.carbs.some(x=>x&&x.name===alt.name)).forEach(alt => {
      const altProfile = NUTRIENT_DB[alt.name] || {tags:[]};
      if(!altProfile.tags.includes(gapKey)) return;
      const simWeek = JSON.parse(JSON.stringify(cw));
      simWeek.carbs[i] = alt;
      const simAnalysis = analyzeNutrientGaps(simWeek);
      if(simAnalysis.gaps.length <= currentGapCount) {
        const newGaps = simAnalysis.gaps.filter(g => !currentAnalysis.gaps.some(cg=>cg.key===g.key));
        const fixedGaps = currentAnalysis.gaps.filter(g => !simAnalysis.gaps.some(sg=>sg.key===g.key));
        swapOptions.push({
          remove: c.name, removeSlot:'carbs', removeIdx:i,
          add: alt, addName: alt.name,
          fixedCount: fixedGaps.length, newGapCount: newGaps.length,
          fixedNames: fixedGaps.map(g=>g.label), newGapNames: newGaps.map(g=>g.label),
          netScore: fixedGaps.length - newGaps.length
        });
      }
    });
  });
  
  // Vegetables
  cw.vegetables.forEach((v, i) => {
    if(!v) return;
    ALL_VEGETABLES.filter(alt => alt !== v && !cw.vegetables.includes(alt)).forEach(alt => {
      const altProfile = NUTRIENT_DB[alt] || {tags:[]};
      if(!altProfile.tags.includes(gapKey)) return;
      const simWeek = JSON.parse(JSON.stringify(cw));
      simWeek.vegetables[i] = alt;
      const simAnalysis = analyzeNutrientGaps(simWeek);
      if(simAnalysis.gaps.length <= currentGapCount) {
        const newGaps = simAnalysis.gaps.filter(g => !currentAnalysis.gaps.some(cg=>cg.key===g.key));
        const fixedGaps = currentAnalysis.gaps.filter(g => !simAnalysis.gaps.some(sg=>sg.key===g.key));
        swapOptions.push({
          remove: v, removeSlot:'vegetables', removeIdx:i,
          add: alt, addName: alt,
          fixedCount: fixedGaps.length, newGapCount: newGaps.length,
          fixedNames: fixedGaps.map(g=>g.label), newGapNames: newGaps.map(g=>g.label),
          netScore: fixedGaps.length - newGaps.length
        });
      }
    });
  });
  
  swapOptions.sort((a,b) => b.netScore - a.netScore || a.newGapCount - b.newGapCount);
  
  const gapInfo = NUTRIENT_GOALS.find(g => g.key === gapKey);
  
  let html = `
    <div class="modal-header">
      <div class="modal-title">↻ Smart Swaps for ${gapInfo ? gapInfo.label : gapKey}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;font-size:0.85rem;color:var(--text2);">Each swap below fixes <strong>${gapInfo ? gapInfo.label : gapKey}</strong> without creating new high-priority gaps:</p>
      ${swapOptions.length === 0 ? '<div class="warning warning-yellow">No clean swaps available for this gap. Try the supplement/snack plan instead.</div>' : ''}
      ${swapOptions.slice(0,6).map(sw => `
        <div style="border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
            <span style="text-decoration:line-through;color:var(--red);font-size:0.9rem;">${sw.remove}</span>
            <span style="color:var(--text3);">→</span>
            <span style="font-weight:600;color:var(--green);font-size:0.9rem;">${sw.addName}</span>
          </div>
          <div style="font-size:0.75rem;color:var(--green);">✓ Fixes: ${sw.fixedNames.join(', ')}</div>
          ${sw.newGapNames.length > 0 ? `<div style="font-size:0.75rem;color:var(--yellow);">⚠ Loses: ${sw.newGapNames.join(', ')}</div>` : '<div style="font-size:0.75rem;color:var(--green);">No new gaps created</div>'}
          <button class="btn-sm" style="margin-top:6px;background:var(--accent-soft);color:var(--accent);" onclick="executeSmartSwap('${sw.removeSlot}',${sw.removeIdx},${typeof sw.add === 'string' ? `'${sw.add.replace(/'/g,"\\'")}'` : JSON.stringify(sw.add).replace(/"/g,'&quot;')})">Apply this swap</button>
        </div>
      `).join('')}
    </div>
  `;
  showModal(html);
}

function ingredientCard(item, type, idx) {
  const name = typeof item === 'string' ? item : item.name;
  const macros = (type !== 'veg' && item.cal) ? `<div class="ingredient-macros">${item.cal}cal · ${item.protein||0}p · ${item.fat||0}f · ${item.carb||0}c /100g</div>` : '';
  const tagClass = type==='protein'?'tag-protein':type==='carb'?'tag-carb':'tag-veg';
  const leftKey = `${type}-${idx}`;
  const leftover = state.leftovers[leftKey];
  const hasLeftover = leftover && leftover.amount > 0;
  const leftoverLabel = hasLeftover ? `✓ ${leftover.amount} ${leftover.unit}` : '🥡 Leftovers';
  return `
    <div class="ingredient-card" style="position:relative;">
      <span class="tag ${tagClass}">${type}</span>
      <div class="ingredient-name" style="margin-top:6px;">${name}</div>
      ${macros}
      <div class="ingredient-actions">
        <button class="btn-sm btn-swap" onclick="showSwapOptions('${type}',${idx})">↻ Swap</button>
        <button class="btn-sm btn-leftover ${hasLeftover?'active':''}" onclick="toggleLeftover('${leftKey}')">
          ${leftoverLabel}
        </button>
      </div>
    </div>
  `;
}

function switchWeek(idx) {
  state.currentWeekIdx = parseInt(idx);
  const w = state.rotation[state.currentWeekIdx];
  state.weekIngredients = { proteins:[...w.proteins], carbs:[...w.carbs], vegetables:[...w.vegetables] };
  state.leftovers = {};
  saveLS();
  renderPhase(2);
}

function toggleLeftover(key) {
  // If already has leftover, clicking removes it
  if(state.leftovers[key]) {
    state.leftovers[key] = null;
    saveLS();
    renderPhase(2);
    return;
  }
  
  // Otherwise prompt for quantity with unit-appropriate input
  const [type, idxStr] = key.split('-');
  const idx = parseInt(idxStr);
  let itemName, unit, placeholder;
  
  if(type === 'protein') {
    itemName = state.weekIngredients.proteins[idx]?.name || 'protein';
    unit = 'lbs';
    placeholder = 'e.g. 1.5';
  } else if(type === 'carb') {
    itemName = state.weekIngredients.carbs[idx]?.name || 'carb';
    unit = 'cups (dry)';
    placeholder = 'e.g. 1';
  } else {
    itemName = state.weekIngredients.vegetables[idx] || 'vegetable';
    const isCanned = itemName.toLowerCase().includes('canned') || itemName.toLowerCase().includes('beans') || itemName.toLowerCase().includes('edamame');
    unit = isCanned ? 'cans' : 'units (heads/bunches)';
    placeholder = 'e.g. 1';
  }
  
  const html = `
    <div class="modal-header">
      <div class="modal-title">🥡 Leftover: ${itemName}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;font-size:0.9rem;color:var(--text2);">How much do you already have? The grocery list will subtract this from what you need to buy.</p>
      <div class="form-group">
        <label class="form-label">Amount in ${unit}</label>
        <input class="form-input" type="number" id="leftoverAmt" min="0" step="0.25" placeholder="${placeholder}" onfocus="this.select()">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLeftover('${key}','${unit}')">Save</button>
    </div>
  `;
  showModal(html);
  setTimeout(() => document.getElementById('leftoverAmt')?.focus(), 100);
}

function saveLeftover(key, unit) {
  const val = parseFloat(document.getElementById('leftoverAmt').value);
  if(isNaN(val) || val <= 0) {

    return;
  }
  state.leftovers[key] = { amount: val, unit };
  saveLS();
  closeModal();
  renderPhase(2);
}

function showSwapOptions(type, idx) {
  const currentWeek = state.currentWeekIdx % state.rotation.length;
  let options = [];
  state.rotation.forEach((w,wi) => {
    if(wi === currentWeek) return;
    const items = type==='protein'?w.proteins:type==='carb'?w.carbs:w.vegetables;
    items.forEach(item => {
      const name = typeof item === 'string' ? item : item.name;
      if(!options.find(o => o.name === name)) options.push(typeof item==='string'?{name:item}:{...item});
    });
  });
  
  let html = `
    <div class="modal-header">
      <div class="modal-title">Swap ${type}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:12px;">
        ${options.map(o => `<div class="swap-option" onclick="doSwap('${type}',${idx},${JSON.stringify(o).replace(/"/g,'&quot;')})">${o.name}${o.cal?' — '+o.cal+'cal/100g':''}</div>`).join('')}
      </div>

function doSwap(type, idx, item) {
  if(type==='protein') state.weekIngredients.proteins[idx] = item;
  else if(type==='carb') state.weekIngredients.carbs[idx] = item;
  else state.weekIngredients.vegetables[idx] = typeof item==='string'?item:item.name;
  closeModal();
  renderPhase(2);
}

function doCustomSwap(type, idx) {
  const name = document.getElementById('customSwapName').value.trim();
  if(!name) return;
  if(type==='veg') {
    state.weekIngredients.vegetables[idx] = name;
    closeModal();
    renderPhase(2);
    return;
  }
  const item = type==='protein'
    ? {name, cal:170, protein:22, fat:5, carb:0}
    : {name, cal:120, protein:3, fat:1, carb:25};
  if(type==='protein') state.weekIngredients.proteins[idx] = item;
  else state.weekIngredients.carbs[idx] = item;
  closeModal();
  renderPhase(2);
}

function getHealthWarnings() {
  const warnings = [];
  const lastWeek = state.history.length > 0 ? state.history[0] : null;
  const curProteins = state.weekIngredients.proteins.map(p => (p.name||p).toLowerCase());
  
  if(lastWeek) {
    const prevProteins = (lastWeek.ingredients?.proteins||[]).map(p => (p.name||p).toLowerCase());
    curProteins.forEach(cp => {
      const isRedMeat = RED_MEAT.some(rm => cp.includes(rm));
      if(isRedMeat && prevProteins.some(pp => RED_MEAT.some(rm => pp.includes(rm)))) {
        warnings.push({level:'red', icon:'⚠️', msg:'Red meat repeating 2+ weeks. Consider limiting to 1-2 weeks per cycle for cardiovascular health.'});
      }
      if(prevProteins.includes(cp)) {
        warnings.push({level:'yellow', icon:'💡', msg:`${cp} was used last week too. Consider rotating for micronutrient variety.`});
      }
    });
  }
  curProteins.forEach(cp => {
    if(HIGH_MERCURY.some(hm => cp.includes(hm))) {
      warnings.push({level:'red', icon:'⚠️', msg:'High-mercury fish selected. Consider lower-mercury options like salmon or cod.'});
    }
  });
  return warnings;
}

function calcTDEE() {
  const d = state.defaults;
  const w = parseFloat(d.weight);
  const hFt = parseFloat(d.height_ft);
  const hIn = parseFloat(d.height_in);
  const age = parseFloat(d.age);
  if(!w||!hFt||!age) return null;
  const wKg = w * 0.453592;
  const hCm = ((hFt*12)+(hIn||0)) * 2.54;
  let bmr = (10*wKg) + (6.25*hCm) - (5*age);
  bmr += d.sex==='Male' ? 5 : -161;
  const activity = parseFloat(d.activityLevel);
  const tdee = Math.round(bmr * activity);
  let goalCal, pPct, cPct, fPct;
  if(d.goal==='cut') { goalCal=tdee-500; pPct=0.4; cPct=0.3; fPct=0.3; }
  else if(d.goal==='bulk') { goalCal=tdee+500; pPct=0.3; cPct=0.45; fPct=0.25; }
  else { goalCal=tdee; pPct=0.3; cPct=0.4; fPct=0.3; }
  return {
    bmr: Math.round(bmr), tdee, goalCal,
    proteinG: Math.round(goalCal*pPct/4),
    carbG: Math.round(goalCal*cPct/4),
    fatG: Math.round(goalCal*fPct/9)
  };
}

let activeSpins = new Set();

// --- FILTER HELPERS ---
// Batch methods are now per-protein: each protein slot gets methods filtered to its own compat list
function getFilteredBatchMethodsForProtein(proteinIdx) {
  const protein = state.weekIngredients.proteins[proteinIdx];
  const batchMethods = state.methods.filter(m => m.type === 'batch');
  if(!protein) return batchMethods;
  const compat = PROTEIN_BATCH_COMPAT[protein.name];
  return compat ? batchMethods.filter(m => compat.includes(m.name)) : batchMethods;
}

// Weekly sauce pool: both sauce wheels should draw from sauces that work with BOTH
// proteins AND BOTH cook methods. If that intersection is non-empty, each protein's
// sauce wheel uses it (with cuisine-variety for protein 1). If empty, we fall back
// to per-protein filtering (method + protein flavor pairing for that one protein only).
function getSharedSaucePool() {
  const proteins = state.weekIngredients.proteins;
  const methods = state.batchMethods;
  // Need both methods spun before we can compute the shared pool
  if(!methods[0] || !methods[1] || !proteins[0] || !proteins[1]) return null;
  const m0Allow = METHOD_SAUCE_COMPAT[methods[0].name];
  const m1Allow = METHOD_SAUCE_COMPAT[methods[1].name];
  const p0Allow = PROTEIN_SAUCE_COMPAT[proteins[0].name];
  const p1Allow = PROTEIN_SAUCE_COMPAT[proteins[1].name];
  return state.sauces.filter(s =>
    (!m0Allow || m0Allow.includes(s.name)) &&
    (!m1Allow || m1Allow.includes(s.name)) &&
    (!p0Allow || p0Allow.includes(s.name)) &&
    (!p1Allow || p1Allow.includes(s.name))
  );
}

// Per-protein fallback pool (used when shared pool is empty or only one method spun)
function getProteinSaucePoolFallback(proteinIdx) {
  const protein = state.weekIngredients.proteins[proteinIdx];
  const method = state.batchMethods[proteinIdx];
  let pool = state.sauces;
  if(method) {
    const mAllow = METHOD_SAUCE_COMPAT[method.name];
    if(mAllow) pool = pool.filter(s => mAllow.includes(s.name));
  }
  if(protein) {
    const pAllow = PROTEIN_SAUCE_COMPAT[protein.name];
    if(pAllow) pool = pool.filter(s => pAllow.includes(s.name));
  }
  return pool;
}

// Main per-protein sauce filter used by wheels. Uses shared pool when possible,
// falls back to protein-specific pool otherwise.
function getFilteredSaucesForProtein(proteinIdx) {
  const shared = getSharedSaucePool();
  let pool;
  if(shared && shared.length > 0) {
    pool = shared;
  } else {
    pool = getProteinSaucePoolFallback(proteinIdx);
  }
  // Cuisine-variety soft constraint: protein 1 tries to differ from protein 0's sauce
  if(proteinIdx === 1) {
    const s0 = state.selectedSauces[0];
    if(s0) {
      const s0Cuisine = getSauceCuisine(s0.name);
      const diverged = pool.filter(s => getSauceCuisine(s.name) !== s0Cuisine && s.name !== s0.name);
      if(diverged.length > 0) pool = diverged;
      else pool = pool.filter(s => s.name !== s0.name); // at minimum, different sauce
    }
  }
  return pool;
}

function getFilteredFinishingMethods(proteinName) {
  const finishMethods = state.methods.filter(m => m.type === 'finishing');
  if(!proteinName) return finishMethods;
  const compat = PROTEIN_FINISH_COMPAT[proteinName];
  if(!compat) return finishMethods;
  return finishMethods.filter(m => compat.includes(m.name));
}

// --- DAILY DINNER FILTER HELPERS ---
// Order: protein picked → sauce → method → rub. Each spinner filters by upstream choices.

// Daily sauce pool: compatible with the protein. If expandSauces is false, restrict to the 2 weekly sauces.
// If expandSauces is true, include any sauce compatible with this protein.
function getDailySaucePool(proteinName, expandSauces) {
  const protAllow = PROTEIN_SAUCE_COMPAT[proteinName] || null;
  if(!expandSauces) {
    // Only the weekly sauces — but still filter to ones that actually work with this protein
    const weekly = state.selectedSauces.filter(Boolean);
    return protAllow ? weekly.filter(s => protAllow.includes(s.name)) : weekly;
  }
  // Expanded: all sauces in DB that match this protein
  return protAllow ? state.sauces.filter(s => protAllow.includes(s.name)) : state.sauces;
}

// Daily cook method pool: filtered by protein + cookType (fresh=batch, finishing=finish) + sauce compat
// cookType: 'finishing' uses PROTEIN_FINISH_COMPAT + state.methods (type=finishing)
// cookType: 'fresh' uses PROTEIN_BATCH_COMPAT + state.methods (type=batch)
function getDailyMethodPool(proteinName, cookType, sauce) {
  const isFresh = cookType === 'fresh';
  const pool = state.methods.filter(m => m.type === (isFresh ? 'batch' : 'finishing'));
  const protCompat = isFresh ? PROTEIN_BATCH_COMPAT[proteinName] : PROTEIN_FINISH_COMPAT[proteinName];
  let filtered = protCompat ? pool.filter(m => protCompat.includes(m.name)) : pool;
  // If sauce is picked AND this is a batch/fresh method, we also want methods whose METHOD_SAUCE_COMPAT includes our sauce
  // (finishing methods don't have sauce compat mapping — any finishing method can carry any sauce at dinner)
  if(sauce && isFresh) {
    const methodsThatPairWithSauce = Object.keys(METHOD_SAUCE_COMPAT).filter(mName => METHOD_SAUCE_COMPAT[mName].includes(sauce.name));
    const pairFiltered = filtered.filter(m => methodsThatPairWithSauce.includes(m.name));
    if(pairFiltered.length > 0) filtered = pairFiltered;
  }
  return filtered;
}

// Daily rub pool: filtered by sauce compat. Optionally narrowed by protein & method if we have data for it.
// Our current data only defines RUB_COMPAT per sauce, which already bakes in good pairings.
function getDailyRubPool(proteinName, methodName, sauce) {
  if(!sauce) return state.rubs;
  const compat = RUB_COMPAT[sauce.name] || [];
  const pool = compat.length > 0 ? state.rubs.filter(r => compat.includes(r.name)) : state.rubs;
  return pool;
}

// Helper: build a single per-protein cascade section (method → sauce)
function renderProteinCascade(proteinIdx) {
  const protein = state.weekIngredients.proteins[proteinIdx];

  const sauceLocked = !bothMethodsSpun;
  const sharedPool = getSharedSaucePool();
  const usingShared = sharedPool && sharedPool.length > 0;
  const lockMsg = '<div class="warning warning-yellow" style="margin:12px 0;text-align:center;">🔒 Spin both batch methods first (the sauce pool is computed from both)</div>';

  const methodResult = bm ? `
    <div class="wheel-result show">

      <button class="btn-sm btn-swap" onclick="respin('method${proteinIdx}')">↻ Re-spin</button>

  const sauceResult = sa ? `

      <button class="btn-sm btn-swap" onclick="respin('sauce${proteinIdx}')">↻ Re-spin</button>
    </div>` : '';

  // Sauce subtitle explains the filtering logic
  let sauceSubtitle;
  if(sauceLocked) {
    sauceSubtitle = 'Both proteins need their batch methods spun before sauces can be filtered.';
  } else if(usingShared) {
    sauceSubtitle = `Filtered to sauces that work with both proteins and both cook methods${proteinIdx === 1 && state.selectedSauces[0] ? ', and differ in cuisine from ' + state.selectedSauces[0].name : ''}.`;
  } else {
    sauceSubtitle = `No sauces work for both proteins + methods — falling back to sauces that suit ${protein.name} with ${bm.name}.`;
  }

  const tagColors = ['var(--accent)', 'var(--blue)'];
  const accent = tagColors[proteinIdx] || 'var(--accent)';

  return `
    <div class="card" style="border-left:4px solid ${accent};">
      <div style="font-size:0.75rem;font-weight:700;color:${accent};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Protein ${proteinIdx + 1}</div>
      <div class="card-title" style="margin-bottom:4px;">🥩 ${protein.name}</div>
      <div class="card-subtitle">Batch method + sauce pairing for this protein</div>

      <h4 style="margin:12px 0 8px;font-size:0.95rem;">🍳 Batch Prep Method</h4>
      <div class="wheel-container">
        <div class="wheel-wrapper">
          <div class="wheel-pointer"></div>
          <canvas class="wheel-canvas" id="methodWheel${proteinIdx}" width="600" height="600"></canvas>
          <div class="wheel-center">🎲</div>
